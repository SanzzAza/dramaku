<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#070b0f">
<title>Dramaku - Streaming Drama Terbaik</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#070b0f;--bg2:#0d1117;--bg3:#151c25;--bg4:#1c2530;--accent:#10b981;--accent2:#34d399;--accent3:#059669;--glow:rgba(16,185,129,.18);--glow2:rgba(16,185,129,.08);--gold:#f59e0b;--text:#eaf0f7;--text2:#8b9cb8;--text3:#4a5b72;--border:rgba(255,255,255,.06);--border2:rgba(16,185,129,.15);--r:16px;--rs:12px}
html,body{font-family:'Plus Jakarta Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;-webkit-font-smoothing:antialiased;min-height:100vh}
body{padding-bottom:80px}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--accent);border-radius:4px}
img{display:block}button{font-family:inherit;-webkit-tap-highlight-color:transparent}

/* ===== SPLASH ===== */
.splash{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .5s,visibility .5s}
.splash.hide{opacity:0;visibility:hidden}
.splash-logo{width:60px;height:60px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;animation:splashPulse 1.5s ease infinite;box-shadow:0 4px 24px var(--glow)}
.splash-text{font-size:22px;font-weight:900;background:linear-gradient(135deg,var(--accent2),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.splash-sub{font-size:11px;color:var(--text3);font-weight:500;letter-spacing:1px}
.splash-bar{width:120px;height:3px;border-radius:3px;background:var(--bg3);overflow:hidden;margin-top:8px}
.splash-bar-fill{height:100%;width:0;background:linear-gradient(90deg,var(--accent3),var(--accent2));border-radius:3px;animation:splashLoad 1.5s ease forwards}
@keyframes splashPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes splashLoad{0%{width:0}100%{width:100%}}

/* ===== HEADER ===== */
.hdr{position:fixed;top:0;left:0;right:0;z-index:100;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:linear-gradient(180deg,rgba(7,11,15,.97),rgba(7,11,15,.85));backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:9px;cursor:pointer}
.logo-icon{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center}
.logo-text{font-size:19px;font-weight:900;letter-spacing:-.5px;background:linear-gradient(135deg,var(--accent2),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-right{display:flex;gap:8px}
.hdr-btn{width:38px;height:38px;border-radius:11px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.hdr-btn:active{transform:scale(.9)}

/* ===== PLATFORM BAR ===== */
.plat-bar{position:fixed;top:56px;left:0;right:0;z-index:99;display:flex;align-items:center;gap:8px;padding:6px 16px;background:var(--bg);border-bottom:1px solid var(--border)}
.plat-sel{flex:1;position:relative}
.plat-btn{width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 14px;border-radius:11px;background:var(--bg3);border:1.5px solid var(--border);color:var(--text);font-size:13px;font-weight:700;cursor:pointer;transition:.2s}
.plat-btn:active{border-color:var(--accent)}
.plat-btn svg{flex-shrink:0;transition:transform .2s}
.plat-btn.open svg{transform:rotate(180deg)}
.plat-dd{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;display:none;z-index:10;box-shadow:0 12px 40px rgba(0,0,0,.6)}
.plat-dd.on{display:block;animation:fadeIn .15s}
.plat-opt{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;transition:.12s;font-size:13px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border)}
.plat-opt:last-child{border:none}
.plat-opt:active{background:var(--bg3)}
.plat-opt.on{color:var(--accent);background:var(--glow2)}
.plat-opt .plat-badge{margin-left:auto;font-size:9px;padding:2px 7px;border-radius:6px;font-weight:700}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

/* ===== TABS ===== */
.tabs{position:fixed;top:98px;left:0;right:0;z-index:98;display:flex;padding:4px 14px;gap:6px;background:linear-gradient(180deg,var(--bg),rgba(7,11,15,.9));overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:7px 16px;font-size:12.5px;font-weight:600;color:var(--text3);cursor:pointer;white-space:nowrap;border-radius:22px;transition:.25s;border:1px solid transparent;display:flex;align-items:center;gap:5px}
.tab.on{color:#fff;background:linear-gradient(135deg,var(--accent3),var(--accent));border-color:var(--accent)}
.tab:not(.on):active{background:var(--bg3)}

/* ===== MAIN ===== */
.main{padding-top:140px;min-height:100vh}
.sec{padding:0 16px;margin-bottom:26px}
.sec-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.sec-tt{font-size:16px;font-weight:800;display:flex;align-items:center;gap:7px}
.sec-more{font-size:10.5px;font-weight:700;color:var(--accent);cursor:pointer;display:flex;align-items:center;gap:4px;padding:5px 11px;border-radius:18px;border:1px solid var(--border2);background:var(--glow2);transition:.2s}
.sec-more:active{transform:scale(.95)}

/* ===== STATS BANNER ===== */
.stats-banner{margin:0 16px 20px;padding:14px 16px;border-radius:var(--rs);background:linear-gradient(135deg,var(--bg3),var(--bg2));border:1px solid var(--border);display:flex;align-items:center;gap:12px}
.stats-banner svg{flex-shrink:0;opacity:.5}
.stats-banner .stats-text{flex:1}
.stats-banner .stats-title{font-size:13px;font-weight:800;margin-bottom:2px}
.stats-banner .stats-sub{font-size:10px;color:var(--text3)}
.random-btn{padding:8px 14px;border-radius:20px;background:linear-gradient(135deg,var(--accent3),var(--accent));border:none;color:#fff;font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit;display:flex;align-items:center;gap:4px}
.random-btn:active{transform:scale(.95)}

/* ===== SHARE BTN ===== */
.share-btn{width:52px;flex:none!important;padding:13px;border-radius:var(--r);background:var(--bg3);border:1.5px solid var(--border);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.share-btn:active{transform:scale(.95);background:var(--bg4)}

/* ===== SCROLL TOP BTN ===== */
.scroll-top{position:fixed;bottom:72px;right:14px;width:38px;height:38px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);color:var(--text2);display:none;align-items:center;justify-content:center;cursor:pointer;z-index:89;transition:.2s;box-shadow:0 2px 10px rgba(0,0,0,.3)}
.scroll-top.show{display:flex}
.scroll-top:active{transform:scale(.9)}

/* ===== PLATFORM BADGE ON CARD ===== */
.badge-plat{position:absolute;bottom:5px;right:5px;z-index:2;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);padding:2px 6px;border-radius:6px;font-size:7px;font-weight:700;color:var(--accent2);border:1px solid var(--border)}

/* ===== HOME FOOTER ===== */
.home-footer{text-align:center;padding:30px 16px 20px;color:var(--text3);font-size:9px;line-height:1.8}
.home-footer a{color:var(--accent);text-decoration:none;font-weight:600}

/* ===== CARD GRID ===== */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.scroll-w{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -16px;padding:0 16px}
.scroll-w::-webkit-scrollbar{display:none}
.scroll-r{display:flex;gap:10px;width:max-content}
.scroll-r .card{width:125px;flex-shrink:0}

/* ===== CARD ===== */
.card{cursor:pointer;border-radius:var(--rs);overflow:hidden;background:var(--bg2);transition:transform .15s;position:relative;border:1px solid var(--border)}
.card:active{transform:scale(.97)}
.card-img{position:relative;width:100%;padding-top:142%;overflow:hidden;background:var(--bg3)}
.card-img img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
.card-img::after{content:'';position:absolute;bottom:0;left:0;right:0;height:45%;background:linear-gradient(transparent,rgba(7,11,15,.75));pointer-events:none}
.badge-ep{position:absolute;top:5px;right:5px;z-index:2;background:rgba(21,28,37,.8);backdrop-filter:blur(6px);padding:2px 7px;border-radius:7px;font-size:8.5px;font-weight:700;border:1px solid var(--border)}
.badge-free{position:absolute;top:5px;left:5px;z-index:2;background:linear-gradient(135deg,#0ea5e9,#38bdf8);padding:2px 7px;border-radius:7px;font-size:7.5px;font-weight:800;color:#fff}
.badge-views{position:absolute;bottom:5px;left:5px;z-index:2;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);padding:2px 7px;border-radius:7px;font-size:7.5px;font-weight:600;display:flex;align-items:center;gap:3px;color:var(--text2)}
.card-body{padding:8px 7px 7px}
.card-name{font-size:11px;font-weight:700;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-rating{display:flex;align-items:center;gap:3px;margin-top:3px;font-size:8.5px;font-weight:700;color:var(--gold)}


/* ===== SKEL ===== */
.skel{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shim 1.8s ease infinite;border-radius:var(--rs)}
@keyframes shim{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-img{width:100%;padding-top:142%}.skel-t{height:10px;margin:7px 7px 3px;width:75%;border-radius:3px}.skel-t2{height:8px;margin:0 7px 7px;width:50%;border-radius:3px}

/* ===== SEARCH ===== */
.search-ov{position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;background:rgba(7,11,15,.96);backdrop-filter:blur(20px);display:none;flex-direction:column;padding:16px}
.search-ov.on{display:flex;animation:fadeIn .15s}
.s-bar{display:flex;gap:10px;align-items:center;margin-bottom:14px}
.s-bar input{flex:1;height:44px;border-radius:12px;background:var(--bg3);border:1.5px solid var(--border);color:var(--text);padding:0 16px;font-size:14px;outline:none;font-family:inherit;transition:.2s}
.s-bar input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
.s-bar input::placeholder{color:var(--text3)}
.s-cancel{background:none;border:none;color:var(--accent);font-size:14px;font-weight:700;cursor:pointer}
.s-results{flex:1;overflow-y:auto;padding-bottom:20px}
.s-empty{text-align:center;color:var(--text3);padding:80px 20px;font-size:13px}

/* ===== DETAIL ===== */
.detail-ov{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:150;background:var(--bg);overflow-y:auto}
.detail-ov.on{display:block;animation:slideU .3s cubic-bezier(.16,1,.3,1)}
@keyframes slideU{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.d-hero{position:relative;width:100%;height:230px;overflow:hidden}
.d-hero img{width:100%;height:100%;object-fit:cover;filter:blur(14px) brightness(.28) saturate(1.3);transform:scale(1.15)}
.d-hero-grad{position:absolute;bottom:0;left:0;right:0;height:80%;background:linear-gradient(transparent,var(--bg))}
.d-back{position:absolute;top:14px;left:14px;z-index:5;width:36px;height:36px;border-radius:11px;background:rgba(0,0,0,.4);backdrop-filter:blur(12px);border:1px solid var(--border);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}
.d-back:active{transform:scale(.9)}
.d-info{display:flex;gap:14px;padding:0 16px;margin-top:-65px;position:relative;z-index:2}
.d-poster{width:105px;flex-shrink:0;border-radius:var(--rs);overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,.5);border:2px solid var(--border2)}
.d-poster img{width:100%;aspect-ratio:570/810;object-fit:cover;background:var(--bg3)}
.d-meta{flex:1;min-width:0;padding-top:14px}
.d-title{font-size:18px;font-weight:900;line-height:1.3;margin-bottom:5px}
.d-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px}
.d-tag{padding:2px 9px;border-radius:16px;background:var(--glow2);border:1px solid var(--border2);font-size:9.5px;color:var(--accent2);font-weight:600}
.d-stats{font-size:10.5px;color:var(--text3);display:flex;flex-wrap:wrap;align-items:center;gap:8px}
.d-rating{display:flex;align-items:center;gap:3px;color:var(--gold);font-weight:700}
.d-desc{padding:14px 16px;font-size:12px;color:var(--text2);line-height:1.8}
.d-desc .more{color:var(--accent);cursor:pointer;font-weight:700}
.play-all-btn{display:flex;align-items:center;justify-content:center;gap:9px;padding:13px;border-radius:var(--r);background:linear-gradient(135deg,var(--accent3),var(--accent),var(--accent2));background-size:200% 200%;animation:grad 3s ease infinite;border:none;color:#fff;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 4px 20px var(--glow)}
.fav-btn{width:52px;flex:none!important;padding:13px;border-radius:var(--r);border:1.5px solid var(--border);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.fav-btn:active{transform:scale(.95)}
.fav-btn.on{background:var(--accent)!important;border-color:var(--accent)}
.play-all-btn:active{transform:scale(.97);opacity:.9}
@keyframes grad{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.ep-sec{padding:0 16px 20px}
.ep-sec-tt{font-size:14px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.ep-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}
.ep-btn{padding:9px 0;text-align:center;border-radius:10px;background:var(--bg3);border:1.5px solid var(--border);color:var(--text2);font-size:11.5px;font-weight:700;cursor:pointer;transition:.2s;font-family:inherit}
.ep-btn:active,.ep-btn.on{background:linear-gradient(135deg,var(--accent3),var(--accent));color:#fff;border-color:var(--accent)}

/* ===== FOOTER (detail page) ===== */
.d-footer{text-align:center;padding:20px 16px 100px;color:var(--text3);font-size:10px;border-top:1px solid var(--border);margin:0 16px}
.d-footer a{color:var(--accent);text-decoration:none;font-weight:600}

/* ===== PLAYER ===== */
.player-ov{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:300;background:#000;flex-direction:column}
.player-ov.on{display:flex}
.p-hdr{position:absolute;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;gap:12px;padding:12px 16px;background:linear-gradient(rgba(0,0,0,.8),transparent)}
.p-back{width:36px;height:36px;border-radius:11px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}
.p-back:active{transform:scale(.9)}
.p-title{flex:1;min-width:0}
.p-title h3{font-size:13px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff}
.p-title p{font-size:9.5px;color:rgba(255,255,255,.4);margin-top:1px}
.p-container{flex:1;overflow-y:scroll;scroll-snap-type:y proximity;-webkit-overflow-scrolling:touch}
.p-container::-webkit-scrollbar{display:none}
.v-slide{width:100%;height:100vh;height:100dvh;scroll-snap-align:start;position:relative;display:flex;align-items:center;justify-content:center;background:#000}
.v-slide video{width:100%;height:100%;object-fit:contain}
.v-slide video::cue{background:rgba(0,0,0,.65);color:#fff;font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;line-height:1.5;padding:2px 6px;border-radius:4px}
.v-loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:12px;z-index:3}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.08);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.v-actions{position:absolute;right:10px;bottom:100px;z-index:5;display:flex;flex-direction:column;gap:18px;align-items:center}
.v-act{display:flex;flex-direction:column;align-items:center;gap:3px}
.v-act button{width:44px;height:44px;border-radius:13px;background:rgba(255,255,255,.08);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.06);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.v-act button:active{transform:scale(.88)}
.v-act button.liked{background:var(--accent);border-color:var(--accent)}
.v-act span{font-size:8.5px;color:rgba(255,255,255,.45);font-weight:600}
.v-info{position:absolute;bottom:0;left:0;right:68px;z-index:4;padding:18px 14px 26px;background:linear-gradient(transparent,rgba(0,0,0,.8))}
.v-info .ep-lbl{display:inline-block;padding:3px 10px;border-radius:16px;background:linear-gradient(135deg,var(--accent3),var(--accent));font-size:9.5px;font-weight:800;margin-bottom:6px;color:#fff}
.v-info .ep-nm{font-size:14px;font-weight:800;margin-bottom:3px;color:#fff}
.v-info .ep-ds{font-size:10.5px;color:rgba(255,255,255,.4);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.v-prog{position:absolute;bottom:0;left:0;right:0;height:2px;background:transparent;z-index:6}
.v-prog-bar{height:100%;background:linear-gradient(90deg,var(--accent3),var(--accent2));width:0;transition:width .25s linear}
.pause-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:64px;height:64px;border-radius:50%;background:rgba(0,0,0,.35);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .25s;pointer-events:none;z-index:5;border:1px solid rgba(255,255,255,.08)}
.pause-icon.show{opacity:1}
/* Double tap heart */
.dbl-heart{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:80px;z-index:7;pointer-events:none;filter:drop-shadow(0 2px 8px rgba(0,0,0,.4))}
.dbl-heart.pop{animation:heartPop .8s ease forwards}
@keyframes heartPop{0%{transform:translate(-50%,-50%) scale(0);opacity:1}25%{transform:translate(-50%,-50%) scale(1.2);opacity:1}50%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-50%) scale(1.4);opacity:0}}

.p-hdr,.v-info,.v-actions{transition:opacity .35s,transform .35s}
.p-ui-hidden .p-hdr{opacity:0;transform:translateY(-20px);pointer-events:none}
.p-ui-hidden .v-info{opacity:0;transform:translateY(20px);pointer-events:none}
.p-ui-hidden .v-actions{opacity:0;transform:translateX(20px);pointer-events:none}

/* ===== EP MODAL ===== */
.ep-modal-backdrop{position:fixed;top:0;left:0;right:0;bottom:0;z-index:315;background:rgba(0,0,0,.55);display:none}
.ep-modal-backdrop.on{display:block}
.ep-modal{position:fixed;bottom:0;left:0;right:0;z-index:320;max-height:70vh;background:var(--bg2);border-radius:18px 18px 0 0;border:1px solid var(--border);border-bottom:none;display:none;flex-direction:column;transform:translateY(100%);transition:transform .35s cubic-bezier(.16,1,.3,1)}
.ep-modal.on{display:flex;transform:translateY(0)}
.ep-m-handle{width:36px;height:4px;border-radius:4px;background:var(--text3);margin:10px auto 0;opacity:.4}
.ep-m-header{display:flex;align-items:center;gap:10px;padding:12px 16px 8px}
.ep-m-poster{width:40px;height:56px;border-radius:7px;overflow:hidden;flex-shrink:0;border:1px solid var(--border2)}
.ep-m-poster img{width:100%;height:100%;object-fit:cover}
.ep-m-info{flex:1;min-width:0}
.ep-m-info h3{font-size:13px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ep-m-info p{font-size:10px;color:var(--text3);margin-top:2px}
.ep-m-close{width:32px;height:32px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ep-m-close:active{transform:scale(.9)}
.ep-m-ranges{display:flex;gap:5px;padding:4px 16px 8px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.ep-m-ranges::-webkit-scrollbar{display:none}
.ep-m-range{padding:5px 14px;border-radius:16px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:.2s;font-family:inherit}
.ep-m-range.on{background:linear-gradient(135deg,var(--accent3),var(--accent));color:#fff;border-color:var(--accent)}
.ep-m-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;padding:0 16px 22px;overflow-y:auto;flex:1}
.ep-m-btn{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:10px;background:var(--bg3);border:1.5px solid var(--border);color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;transition:.2s;font-family:inherit}
.ep-m-btn:active{transform:scale(.92)}
.ep-m-btn.on{background:linear-gradient(135deg,var(--accent3),var(--accent));color:#fff;border-color:var(--accent)}

/* ===== BOTTOM NAV ===== */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:90;display:flex;height:60px;background:linear-gradient(0deg,rgba(7,11,15,.98),rgba(7,11,15,.9));backdrop-filter:blur(24px);border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom,0)}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--text3);cursor:pointer;border:none;background:none;font-family:inherit;transition:.2s;position:relative}
.bnav-item.on{color:var(--accent)}
.bnav-item.on::before{content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:20px;height:2.5px;border-radius:0 0 3px 3px;background:var(--accent)}
.bnav-item svg{width:20px;height:20px}
.bnav-item span{font-size:8.5px;font-weight:700}

/* ===== CONTINUE WATCHING CARD ===== */
.cw-card{display:flex;gap:12px;padding:12px;margin:0 16px 20px;border-radius:var(--rs);background:var(--bg2);border:1px solid var(--border);cursor:pointer;transition:.15s;overflow:hidden;position:relative}
.cw-card:active{transform:scale(.98)}
.cw-poster{width:70px;height:98px;border-radius:8px;overflow:hidden;flex-shrink:0;background:var(--bg3)}
.cw-poster img{width:100%;height:100%;object-fit:cover}
.cw-info{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:4px}
.cw-title{font-size:13px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cw-sub{font-size:10px;color:var(--text3)}
.cw-btn{display:flex;align-items:center;gap:5px;padding:6px 14px;border-radius:20px;background:var(--accent);color:#fff;font-size:10.5px;font-weight:700;border:none;cursor:pointer;width:fit-content;margin-top:4px}
.cw-badge{position:absolute;top:0;right:0;padding:4px 10px;border-radius:0 0 0 10px;background:var(--accent);font-size:8px;font-weight:800;color:#fff}

/* ===== BETTER EMPTY STATE ===== */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 30px;color:var(--text3);text-align:center;gap:12px}
.empty-state svg{opacity:.25}
.empty-state p{font-size:13px;line-height:1.5}
.empty-state .empty-sub{font-size:11px;color:var(--text3);opacity:.7}

.err{text-align:center;padding:80px 16px;color:var(--text3)}
.err p{font-size:12px;margin:10px 0}
.retry{padding:9px 22px;border-radius:11px;background:linear-gradient(135deg,var(--accent3),var(--accent));color:#fff;border:none;font-size:12px;font-weight:700;cursor:pointer}
.retry:active{transform:scale(.95)}
.load-spin{display:flex;justify-content:center;padding:30px 0}

@media(min-width:500px){.grid{grid-template-columns:repeat(4,1fr)}.ep-grid{grid-template-columns:repeat(8,1fr)}}
@media(min-width:768px){.grid{grid-template-columns:repeat(5,1fr)}}
@media(min-width:1024px){.grid{grid-template-columns:repeat(6,1fr)}.main{max-width:1100px;margin:0 auto}}
</style>
</head>

function mbMap(d){return{drama_id:d.subjectId,drama_name:d.title||'',description:d.description||'',episode_count:'',watch_value:d.viewers?String(d.viewers):'',thumb_url:d.cover?.url||'',tags:d.genre?d.genre.split(', '):[],is_new_book:'0',_subjectType:d.subjectType,_imdb:d.imdbRatingValue||d.imdbRate||'',_duration:d.seconds?Math.floor(d.seconds/60)+'m':d.duration||''}}
function flat(data){
  if(!data||typeof data!=='object')return[];let out=[];
  if(Array.isArray(data)){data.forEach(g=>{if(g.books&&Array.isArray(g.books))out.push(...g.books);else if(g.drama_id)out.push(g)})}
  else if(data.items&&Array.isArray(data.items)){out=data.items.map(d=>({drama_id:d.drama_id,drama_name:d.title||d.drama_name||'',description:d.description||d.synopsis||'',episode_count:d.total_episodes||d.episode_count||'',watch_value:d.view_count?String(d.view_count):'',thumb_url:d.poster||d.raw?.coverImage||d.raw?.posterImg||'',tags:d.categories?d.categories.map(c=>c.name||c):(d.raw?.categoryNames||[]),free:d.free||false,is_new_book:d.is_new_book||'0'}))}
  // MovieBox: data.subjects[] OR data.results[].subjects[]
  else if(data.subjects&&Array.isArray(data.subjects)){out=data.subjects.map(mbMap)}
  else if(data.results&&Array.isArray(data.results)){data.results.forEach(r=>{if(r.subjects)out.push(...r.subjects.map(mbMap))})}
  out.forEach(d=>{if(d.thumb_url)d.thumb_url=fixImg(d.thumb_url);if(!d.thumb_url&&d.cover)d.thumb_url=d.cover;if(d.drama_id&&d.thumb_url)thumbCache[d.drama_id]=d.thumb_url;if(d.drama_id)platCache[d.drama_id]=d.free?'freereels':P});
  return out;
}

async function loadTab(t){
  if(busy[t]||more[t]===0)return;busy[t]=1;const box=$('#v-'+t),base=API[P];

      let hU=base+'/home?page=1'+dbLang,pU=base+'/populer?page=1'+dbLang,nU=base+'/new?page=1'+dbLang;
      if(P==='dramanova'){pU=base+'/discovery?size=10';nU=base+'/recommend?page=1&size=10'}
      else if(P==='flickreels'){pU=base+'/populer';nU=base+'/new?page=1'}
      else if(P==='reelshort'){hU=base+'/home?tab_id=0&sub_tab_id=0';pU=base+'/populer?page=1&limit=20&period=0&rule=0';nU=base+'/new?page=1&limit=20'}

      else if(P==='goodshort'){hU=base+'/home';pU=base+'/populer?page=1';nU=base+'/new?page=1&channelId=563'}
      else if(P==='moviebox'){hU=base+'/indonesia?page=1&perPage=10';pU=base+'/indonesia?page=1&perPage=10';nU=base+'/global?page=1&perPage=10'}
      const[hd,pd,nd]=await Promise.all([fetch(hU).then(r=>r.json()),fetch(pU).then(r=>r.json()),fetch(nU).then(r=>r.json())]);

      // Continue watching card
      const lastW=getHistory()[0];
      const hr=new Date().getHours();const greet=hr<11?'Selamat pagi':hr<15?'Selamat siang':hr<18?'Selamat sore':'Selamat malam';
      if(lastW)h+=`<div class="cw-card" onclick="resumeWatch('${lastW.id}','${lastW.thumb.replace(/'/g,"\\\\'")}','${lastW.plat}',${lastW.ep})"><div class="cw-poster"><img src="${lastW.thumb}" onerror="this.style.display='none'"/></div><div class="cw-info"><div class="cw-sub">${greet}, lanjut nonton?</div><div class="cw-title">${lastW.name}</div><button class="cw-btn" onclick="event.stopPropagation();resumeWatch('${lastW.id}','${lastW.thumb.replace(/'/g,"\\\\'")}','${lastW.plat}',${lastW.ep})"><svg width="12" height="12" viewBox="0 0 24 24" fill="#fff"><path d="M8 5v14l11-7z"/></svg> Lanjut Episode ${lastW.ep}</button></div><div class="cw-badge">Terakhir</div></div>`;

    }catch(e){if(pg[t]===1&&g)g.innerHTML=errHtml()}
  }
  busy[t]=0;
}

function getDetailUrl(dp,id){
  if(dp==='dramabox')return API[dp]+`/detail?bookId=${id}&lang=in`;
  if(dp==='goodshort')return API[dp]+`/detail?bookId=${id}`;
  if(dp==='moviebox')return API[dp]+`/detail?subjectId=${id}`;
  const nl=dp==='flickreels'||dp==='dramanova'||dp==='reelshort'||dp==='netshort';
  return API[dp]+`/detail?id=${id}`+(nl?'':'&lang=id');
}

async function play(did,ep){
  closeEpModal();$('#plOv').classList.add('on');$('#plName').textContent=curDrama?.drama_name||'';$('#plEp').textContent='Episode '+ep;
  if(curDrama)saveHistory(curDrama,ep);
  curPE=ep;const cont=$('#plCont');cont.innerHTML='';const total=curDrama?.episode_count||curEps.length||ep;
  const ps=Math.max(1,ep-2);for(let i=ps;i<ep;i++)cont.insertAdjacentHTML('beforeend',slideHtml(did,i));
  for(let i=ep;i<ep+Math.min(3,total-ep+1);i++)cont.insertAdjacentHTML('beforeend',slideHtml(did,i));
  loadVid(did,ep);
  requestAnimationFrame(()=>{const t=cont.querySelector(`.v-slide[data-ep="${ep}"]`);if(t)t.scrollIntoView({behavior:'instant'})});
  cont.onscroll=debounce(()=>{
    const slides=cont.querySelectorAll('.v-slide');let active=null;
    slides.forEach(s=>{const r=s.getBoundingClientRect();if(r.top>=-80&&r.top<window.innerHeight/2)active=s});
    if(!active)return;const ae=+active.dataset.ep;$('#plEp').textContent='Episode '+ae;curPE=ae;showUI();
    if(curDrama)saveHistory(curDrama,ae);
    cont.querySelectorAll('video').forEach(v=>{if(v.closest('.v-slide')===active)v.play().catch(()=>{});else v.pause()});
    if(!active.dataset.ld)loadVid(did,ae);
    const last=slides[slides.length-1],le=+last.dataset.ep;
    if(ae>=le-1&&le<total)for(let i=le+1;i<=Math.min(le+2,total);i++)cont.insertAdjacentHTML('beforeend',slideHtml(did,i));
    const first=slides[0],fe=+first.dataset.ep;
    if(ae<=fe+1&&fe>1)for(let i=fe-1;i>=Math.max(1,fe-2);i--)cont.insertAdjacentHTML('afterbegin',slideHtml(did,i));
  },120);
}
function slideHtml(did,ep){
  return`<div class="v-slide" data-ep="${ep}" data-did="${did}"><div class="v-loading"><div class="spinner"></div><span style="color:var(--text3);font-size:10px">Episode ${ep}</span></div>
  <div class="v-info"><div class="ep-lbl">Episode ${ep}</div><div class="ep-nm">${curDrama?.drama_name||''}</div><div class="ep-ds">${curDrama?.description||''}</div></div>
  <div class="v-actions"><div class="v-act"><button onclick="this.classList.toggle('liked')"><svg width="19" height="19" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54z"/></svg></button><span>Suka</span></div>
  <div class="v-act"><button onclick="openEpModal()"><svg width="19" height="19" viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg></button><span>Episode</span></div>
  <div class="v-act"><button onclick="nextEp()"><svg width="19" height="19" viewBox="0 0 24 24" fill="currentColor"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/></svg></button><span>Next</span></div></div>
  <div class="dbl-heart" id="heart-${ep}"><svg width="80" height="80" viewBox="0 0 24 24" fill="var(--accent)"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54z"/></svg></div>
  <div class="v-prog"><div class="v-prog-bar" id="prg-${ep}"></div></div></div>`;
}
async function loadVid(did,ep){
  const slide=$(`.v-slide[data-ep="${ep}"][data-did="${did}"]`);if(!slide||slide.dataset.ld)return;slide.dataset.ld='1';
  let url=null,isHLS=false,subUrl=null;const dp=curDrama?._p||platCache[did]||P;
  if(dp==='freereels'){try{const d=await fetch(API.freereels+`/stream?dramaId=${did}&episode=${ep}&lang=id`).then(r=>r.json());if(d?.data){let raw=d.data.h264_m3u8||d.data.m3u8_url||d.data.video_url;if(raw){url='https://proxy.sonzaixlab.workers.dev/proxy?url='+encodeURIComponent(raw);isHLS=true};if(d.data.subtitles?.length){const st=d.data.subtitles.find(s=>s.language==='id-ID'||s.language?.startsWith('id'))||d.data.subtitles[0];if(st?.url)subUrl=st.url}}}catch(e){}}
  else if(dp==='flickreels'){try{const d=await fetch(API.flickreels+`/stream?id=${did}&ep=${ep}`).then(r=>r.json());if(d?.data?.hls_url){url=d.data.hls_url;isHLS=true}}catch(e){}}
  else if(dp==='reelshort'){try{const d=await fetch(API.reelshort+`/stream?id=${did}&episode_no=${ep}`).then(r=>r.json());if(d?.data){const vl=d.data.videoList||[];const pick=vl.find(v=>v.encode==='H264'&&v.dpi===720)||vl.find(v=>v.encode==='H264')||vl[0];if(pick?.playUrl){url=pick.playUrl;isHLS=true}else if(d.data.play_url){url=d.data.play_url;isHLS=true}}}catch(e){}}
  else if(dp==='moviebox'){
    try{
      const st=curDrama?._subjectType||1;
      let d;
      if(st===2){d=await fetch(API.moviebox+`/download-series?subjectId=${did}&se=1&resolution=720`).then(r=>r.json());if(d?.data?.episodes?.length){const epd=d.data.episodes.find(e=>e.ep===ep)||d.data.episodes[0];if(epd?.resourceLink)url=epd.resourceLink;if(epd?.subtitle?.url)subUrl=epd.subtitle.url}}
      else{d=await fetch(API.moviebox+`/download-movie?subjectId=${did}&resolution=720`).then(r=>r.json());if(d?.data?.files?.length){const f=d.data.files.find(f=>f.codecName==='h264')||d.data.files.find(f=>f.resolution===720)||d.data.files[0];if(f?.resourceLink)url=f.resourceLink};if(d?.data?.subtitle?.url)subUrl=d.data.subtitle.url}
    }catch(e){}
  }else if(dp==='goodshort'){
    try{
      // GoodShort stream returns all episodes. Cache it.
      if(!window._gsCache||window._gsCache.id!==did){const d=await fetch(API.goodshort+`/stream?bookId=${did}`).then(r=>r.json());if(d?.data?.downloadList)window._gsCache={id:did,list:d.data.downloadList}}
      if(window._gsCache?.list){const epData=window._gsCache.list[ep-1];if(epData?.multiVideos?.length){const mv=epData.multiVideos.find(v=>v.type==='720p')||epData.multiVideos[0];if(mv?.filePath){url=mv.filePath;isHLS=true}}}
    }catch(e){}
  }else if(dp==='dramabox'){
    try{const d=await fetch(API.dramabox+`/stream?bookId=${did}&chapterIndex=${ep-1}&lang=in`).then(r=>r.json());if(d?.data){url=d.data.videoUrl||null;if(!url&&d.data.qualities?.length){const q=d.data.qualities.find(q=>q.quality===720)||d.data.qualities[0];if(q)url=q.videoPath}}}catch(e){}
  }else if(dp==='netshort'){
    try{const d=await fetch(API.netshort+`/streamv2?id=${did}&ep=${ep}`).then(r=>r.json());if(d?.data){url=d.data.play_url||null;if(!url&&d.data.streams?.length){const s=d.data.streams.find(s=>s.encode==='H264')||d.data.streams[0];if(s)url=s.url}}}catch(e){}
  }else if(dp==='dramanova'){try{const d=await fetch(API.dramanova+`/stream?id=${did}&ep=${ep}`).then(r=>r.json());if(d?.data?.play){url=d.data.play.video_url||d.data.play.backup_url||null;if(!url&&d.data.play.qualities?.length){const q=d.data.play.qualities.find(q=>q.codec==='h264')||d.data.play.qualities[0];url=q.main_url||q.backup_url}};if(d?.data?.info?.subtitle_tracks?.length){const st=d.data.info.subtitle_tracks.find(s=>s.language==='in'||s.language==='id')||d.data.info.subtitle_tracks[0];if(st?.label)subUrl=st.label}}catch(e){}}
  else{try{const d=await fetch(API.melolo+`/streamv2?id=${did}&ep=${ep}`).then(r=>r.json());if(d?.url&&d.playable!==false)url=d.url}catch(e){}
    if(!url){try{const d=await fetch(API.melolo+`/stream?id=${did}&ep=${ep}`).then(r=>r.json());if(d?.qualities?.length){const q=d.qualities.find(q=>q.codec==='h264')||d.qualities[d.qualities.length-1];if(q)url=q.url}}catch(e){}}}
  const loader=slide.querySelector('.v-loading');
  const vid=document.createElement('video');
  vid.setAttribute('playsinline','');vid.setAttribute('webkit-playsinline','');vid.setAttribute('preload','auto');
  if(isHLS&&typeof Hls!=='undefined'&&Hls.isSupported()){const hls=new Hls({maxBufferLength:30,enableWorker:true});hls.loadSource(url);hls.attachMedia(vid);hls.on(Hls.Events.ERROR,(e,d)=>{if(d.fatal&&loader){loader.style.display='flex';loader.innerHTML='<p style="color:var(--text3);font-size:11px">Gagal memutar</p>'}});slide._hls=hls}
  else if(isHLS&&vid.canPlayType('application/vnd.apple.mpegurl')){vid.src=url}else{vid.src=url}
  if(subUrl)loadSub(vid,subUrl);
  vid.addEventListener('loadeddata',()=>{if(loader)loader.style.display='none';if(+slide.dataset.ep===curPE){vid.play().catch(()=>{});scheduleHideUI()}});
  vid.addEventListener('timeupdate',()=>{const p=$('#prg-'+ep);if(p&&vid.duration)p.style.width=(vid.currentTime/vid.duration*100)+'%'});
  vid.addEventListener('ended',()=>{const ns=slide.nextElementSibling;if(ns)ns.scrollIntoView({behavior:'smooth'})});
  vid.addEventListener('error',()=>{if(loader){loader.style.display='flex';loader.innerHTML='<p style="color:var(--text3);font-size:11px">Gagal memutar</p>'}});
  // Double tap like + single tap pause
  let lastTap=0;
  vid.addEventListener('click',e=>{
    e.preventDefault();const now=Date.now();
    if(now-lastTap<300){// double tap = like
      const heart=$('#heart-'+slide.dataset.ep);if(heart){heart.classList.remove('pop');void heart.offsetWidth;heart.classList.add('pop')}
      const likeBtn=slide.querySelector('.v-act button');if(likeBtn&&!likeBtn.classList.contains('liked'))likeBtn.classList.add('liked');
      lastTap=0;return;
    }
    lastTap=now;
    setTimeout(()=>{
      if(Date.now()-lastTap<300)return;// wait for possible double tap
      const icon=slide.querySelector('.pause-icon')||mkPause(slide);
      if(vid.paused){vid.play().catch(()=>{});icon.innerHTML='<svg width="26" height="26" viewBox="0 0 24 24" fill="#fff"><path d="M8 5v14l11-7z"/></svg>';icon.classList.add('show');setTimeout(()=>icon.classList.remove('show'),400);scheduleHideUI()}
      else{if($('#plOv').classList.contains('p-ui-hidden')){showUI();return}vid.pause();icon.innerHTML='<svg width="26" height="26" viewBox="0 0 24 24" fill="#fff"><path d="M6 4h4v16H6zM14 4h4v16h-4z"/></svg>';icon.classList.add('show');showUI()}
    },300);
  });
  slide.insertBefore(vid,slide.firstChild);
}
async function loadSub(vid,srtUrl){try{const r=await fetch('https://proxy.sonzaixlab.workers.dev/proxy?url='+encodeURIComponent(srtUrl));if(!r.ok)return;const srt=await r.text();let vtt='WEBVTT\n\n'+srt.replace(/(\d{2}:\d{2}:\d{2}),(\d{3})/g,'$1.$2');const b=new Blob([vtt],{type:'text/vtt'});const t=document.createElement('track');t.kind='subtitles';t.label='Indonesia';t.srclang='id';t.src=URL.createObjectURL(b);t.default=true;vid.appendChild(t);vid.textTracks[0].mode='showing'}catch(e){}}
function mkPause(s){const d=document.createElement('div');d.className='pause-icon';s.appendChild(d);return d}
let uiTimer=null;
function showUI(){$('#plOv').classList.remove('p-ui-hidden');const v=$('#plOv').querySelector(`.v-slide[data-ep="${curPE}"] video`);if(v&&!v.paused)scheduleHideUI()}
function hideUI(){$('#plOv').classList.add('p-ui-hidden')}
function scheduleHideUI(){clearTimeout(uiTimer);uiTimer=setTimeout(hideUI,3000)}
function nextEp(){const c=$('#plCont'),cur=c.querySelector(`.v-slide[data-ep="${curPE}"]`);if(cur?.nextElementSibling)cur.nextElementSibling.scrollIntoView({behavior:'smooth'})}
function closePl(){clearTimeout(uiTimer);closeEpModal();const ov=$('#plOv');ov.classList.remove('on','p-ui-hidden');ov.querySelectorAll('.v-slide').forEach(s=>{if(s._hls){s._hls.destroy();s._hls=null}});ov.querySelectorAll('video').forEach(v=>{v.pause();v.removeAttribute('src');v.load()});$('#plCont').innerHTML=''}

function openEpModal(){
  showUI();clearTimeout(uiTimer);const total=curDrama?.episode_count||curEps.length||0;
  const poster=curDrama?._thumb||thumbCache[curDrama?.drama_id]||'';
  $('#epModPoster').src=poster;$('#epModTitle').textContent=curDrama?.drama_name||'';$('#epModSub').textContent=total+' Episode';
  const rs=30,rc=Math.ceil(total/rs);let rh='';
  for(let i=0;i<rc;i++){const s=i*rs+1,e=Math.min((i+1)*rs,total);rh+=`<button class="ep-m-range${i===0?' on':''}" onclick="switchEpRange(${i},${total})" data-ri="${i}">${s}-${e}</button>`}
  $('#epModRanges').innerHTML=rh;renderEpRange(0,total);$('#epBd').classList.add('on');requestAnimationFrame(()=>$('#epMod').classList.add('on'));
}
function renderEpRange(ri,total){const rs=30,s=ri*rs+1,e=Math.min((ri+1)*rs,total);let h='';for(let i=s;i<=e;i++){const p=i===curPE;h+=`<button class="ep-m-btn${p?' on':''}" onclick="playFromModal(${i})">${p?'<svg width="13" height="13" viewBox="0 0 24 24" fill="#fff"><path d="M3 9v6h4l5 5V4L7 9H3z"/><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>':i}</button>`}$('#epModGrid').innerHTML=h}
function switchEpRange(i,t){$$('.ep-m-range').forEach(e=>e.classList.toggle('on',+e.dataset.ri===i));renderEpRange(i,t)}
function playFromModal(ep){closeEpModal();const did=curDrama?.drama_id;if(!did)return;const cont=$('#plCont');cont.querySelectorAll('.v-slide').forEach(s=>{if(s._hls){s._hls.destroy();s._hls=null}});cont.querySelectorAll('video').forEach(v=>{v.pause();v.removeAttribute('src');v.load()});cont.innerHTML='';curPE=ep;$('#plEp').textContent='Episode '+ep;const total=curDrama?.episode_count||curEps.length||ep;const ps=Math.max(1,ep-2);for(let i=ps;i<ep;i++)cont.insertAdjacentHTML('beforeend',slideHtml(did,i));for(let i=ep;i<ep+Math.min(3,total-ep+1);i++)cont.insertAdjacentHTML('beforeend',slideHtml(did,i));loadVid(did,ep);requestAnimationFrame(()=>{const t=cont.querySelector(`.v-slide[data-ep="${ep}"]`);if(t)t.scrollIntoView({behavior:'instant'})})}
function closeEpModal(){$('#epMod').classList.remove('on');$('#epBd').classList.remove('on')}

function openSearch(){$('#sOv').classList.add('on');setTimeout(()=>$('#sInp').focus(),150)}
function closeSearch(){$('#sOv').classList.remove('on');$('#sInp').value=''}
function debSearch(){clearTimeout(sto);sto=setTimeout(doSearch,350)}
async function doSearch(){
  const q=$('#sInp').value.trim(),box=$('#sRes');
  if(!q){box.innerHTML='<div class="empty-state" style="padding-top:100px"><svg width="48" height="48" viewBox="0 0 24 24" fill="currentColor" opacity=".2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg><p>Ketik judul drama untuk mencari</p><p class="empty-sub">Cari dari 9 platform sekaligus</p></div>';return}
  box.innerHTML=`<div class="grid">${skelHtml(6,1)}</div>`;
  try{const eq=encodeURIComponent(q);
    const[r1,r2,r3,r4,r5,r6,r7,r8,r9]=await Promise.allSettled([
      fetch(API.melolo+`/search?q=${eq}&page=1&lang=id`).then(r=>r.json()),
      fetch(API.freereels+`/search?q=${eq}&page=1&lang=id`).then(r=>r.json()),
      fetch(API.flickreels+`/search?q=${eq}`).then(r=>r.json()),
      fetch(API.dramanova+`/search?q=${eq}&page=1&size=10`).then(r=>r.json()),
      fetch(API.reelshort+`/search?q=${eq}&page=1&limit=10`).then(r=>r.json()),
      fetch(API.netshort+`/search?query=${eq}&page=1`).then(r=>r.json()),
      fetch(API.dramabox+`/search?q=${eq}&page=1&lang=in`).then(r=>r.json()),
      fetch(API.goodshort+`/search?q=${eq}&page=1`).then(r=>r.json()),
      fetch(API.moviebox+`/search?q=${eq}&page=1&perPage=10`).then(r=>r.json())
    ]);
    const tag=(r,p)=>{const items=r.status==='fulfilled'?flat(r.value.data):[];items.forEach(d=>{if(d.drama_id)platCache[d.drama_id]=p});return items};
    const a=[...tag(r1,'melolo'),...tag(r2,'freereels'),...tag(r3,'flickreels'),...tag(r4,'dramanova'),...tag(r5,'reelshort'),...tag(r6,'netshort'),...tag(r7,'dramabox'),...tag(r8,'goodshort'),...tag(r9,'moviebox')];
    if(a.length)box.innerHTML=`<div class="grid">${a.map(cardHtml).join('')}</div>`;
    else box.innerHTML=emptyHtml('Tidak ditemukan untuk "'+q+'"','Coba kata kunci lain');
  }catch(e){box.innerHTML='<div class="s-empty">Gagal mencari</div>'}
}

window.addEventListener('scroll',()=>{
  // Infinite scroll
  if(curTab!=='home'){const trg=$('#trg-'+curTab);if(trg&&trg.getBoundingClientRect().top<window.innerHeight+300)loadTab(curTab)}
  // Scroll to top button
  const btn=$('#scrollTop');if(btn){if(window.scrollY>400)btn.classList.add('show');else btn.classList.remove('show')}
});
function debounce(fn,ms){let t;return function(...a){clearTimeout(t);t=setTimeout(()=>fn.apply(this,a),ms)}}
/* ===== HISTORY (localStorage) ===== */
function getHistory(){try{return JSON.parse(localStorage.getItem('dk_history')||'[]')}catch(e){return[]}}
function saveHistory(drama,ep){
  let h=getHistory();h=h.filter(x=>x.id!==drama.drama_id);
  h.unshift({id:drama.drama_id,name:drama.drama_name,thumb:drama._thumb||thumbCache[drama.drama_id]||'',ep:ep,plat:drama._p||P,time:Date.now()});
  if(h.length>50)h=h.slice(0,50);
  localStorage.setItem('dk_history',JSON.stringify(h));
}
function renderHistory(){
  const box=$('#v-history'),h=getHistory();
  if(!h.length){box.innerHTML=emptyHtml('Belum ada riwayat tontonan','Drama yang kamu tonton akan muncul di sini');return}
  box.innerHTML=`<div class="sec"><div class="sec-hd"><h2 class="sec-tt">Riwayat Tontonan</h2><div class="sec-more" onclick="if(confirm('Hapus semua riwayat?')){localStorage.removeItem('dk_history');renderHistory()}">Hapus</div></div><div class="grid">${h.map(d=>{
    platCache[d.id]=d.plat;thumbCache[d.id]=d.thumb;
    return`<div class="card" onclick="openDet('${d.id}','${d.thumb.replace(/'/g,"\\\\'")}')"><div class="card-img"><img src="${d.thumb}" loading="lazy" onerror="this.style.display='none'"/><div class="badge-ep" style="background:var(--accent);color:#fff">Ep ${d.ep}</div></div><div class="card-body"><div class="card-name">${d.name}</div><div class="card-rating" style="color:var(--text3)">Lanjut Ep ${d.ep}</div></div></div>`;
  }).join('')}</div></div>`;
}

/* ===== FAVORITES (localStorage) ===== */
function getFavs(){try{return JSON.parse(localStorage.getItem('dk_favs')||'[]')}catch(e){return[]}}
function toggleFav(drama){
  let f=getFavs();const idx=f.findIndex(x=>x.id===drama.drama_id);
  if(idx>=0){f.splice(idx,1)}else{f.unshift({id:drama.drama_id,name:drama.drama_name,thumb:drama._thumb||thumbCache[drama.drama_id]||'',plat:drama._p||P,ep:drama.episode_count||0})}
  localStorage.setItem('dk_favs',JSON.stringify(f));return idx<0;
}
function isFav(id){return getFavs().some(x=>x.id===id)}
function toggleFavBtn(btn){if(!curDrama)return;const on=toggleFav(curDrama);btn.classList.toggle('on',on);btn.style.background=on?'var(--accent)':'var(--bg3)'}
function renderFav(){
  const box=$('#v-fav'),f=getFavs();
  if(!f.length){box.innerHTML=emptyHtml('Belum ada drama favorit','Tap bookmark di halaman detail untuk menyimpan');return}
  box.innerHTML=`<div class="sec"><div class="sec-hd"><h2 class="sec-tt">Drama Favorit</h2></div><div class="grid">${f.map(d=>{
    platCache[d.id]=d.plat;thumbCache[d.id]=d.thumb;
    return`<div class="card" onclick="openDet('${d.id}','${d.thumb.replace(/'/g,"\\\\'")}')"><div class="card-img"><img src="${d.thumb}" loading="lazy" onerror="this.style.display='none'"/>${d.ep?`<div class="badge-ep">${d.ep} Ep</div>`:''}</div><div class="card-body"><div class="card-name">${d.name}</div></div></div>`;
  }).join('')}</div></div>`;
}

/* ===== RANDOM PICK ===== */
async function randomPick(){
  const platforms=['melolo','freereels','flickreels','dramanova','reelshort','netshort','dramabox','goodshort'];
  const rp=platforms[Math.floor(Math.random()*platforms.length)];
  const base=API[rp];
  try{
    const pg=Math.floor(Math.random()*3)+1;
    let url=base+'/home?page='+pg;
    if(rp==='flickreels'||rp==='dramanova'||rp==='netshort'||rp==='goodshort')url=base+'/home';
    else if(rp==='dramabox')url=base+'/home?page='+pg+'&lang=in';
    else url=base+'/home?page='+pg+'&lang=id';
    const d=await fetch(url).then(r=>r.json());
    const items=flat(d.data);
    if(items.length){
      const pick=items[Math.floor(Math.random()*items.length)];
      if(pick.drama_id){platCache[pick.drama_id]=rp;openDet(pick.drama_id,pick.thumb_url)}
    }
  }catch(e){}
}

/* ===== SHARE ===== */
function shareDrama(){
  if(!curDrama)return;
  const text=`Nonton "${curDrama.drama_name}" di Dramaku!`;
  if(navigator.share){navigator.share({title:'Dramaku',text,url:location.href}).catch(()=>{})}
  else{navigator.clipboard?.writeText(text+' '+location.href);alert('Link disalin!')}
}
