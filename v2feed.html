<!-- ════ ADAPTIVE UI COLOR ENGINE ════ -->
<script>
(function(){
  'use strict';

  /* ── Canvas color extractor ── */
  function extractColors(imgUrl, cb){
    var img=new Image();
    img.crossOrigin='anonymous';
    img.onload=function(){
      try{
        var canvas=document.createElement('canvas');
        var SIZE=80;
        canvas.width=SIZE;canvas.height=SIZE;
        var ctx=canvas.getContext('2d');
        ctx.drawImage(img,0,0,SIZE,SIZE);
        var data=ctx.getImageData(0,0,SIZE,SIZE).data;
        // Sample tiap 4px, kumpulkan warna non-hitam/non-putih
        var buckets={};
        for(var i=0;i<data.length;i+=16){
          var r=data[i],g=data[i+1],b=data[i+2];
          // Skip terlalu gelap atau terlalu terang
          var bright=(r+g+b)/3;
          if(bright<30||bright>220)continue;
          // Skip warna abu-abu (saturation rendah)
          var max=Math.max(r,g,b),min=Math.min(r,g,b);
          var sat=(max-min)/Math.max(max,1);
          if(sat<0.18)continue;
          // Quantize ke bucket 32px
          var qr=Math.round(r/32)*32;
          var qg=Math.round(g/32)*32;
          var qb=Math.round(b/32)*32;
          var key=qr+','+qg+','+qb;
          buckets[key]=(buckets[key]||{count:0,r:0,g:0,b:0});
          buckets[key].count++;
          buckets[key].r+=r;
          buckets[key].g+=g;
          buckets[key].b+=b;
        }
        // Ambil top 5 bucket
        var sorted=Object.keys(buckets).sort(function(a,b){
          return buckets[b].count-buckets[a].count;
        }).slice(0,5);
        if(!sorted.length){cb(null);return;}
        var palette=sorted.map(function(k){
          var bk=buckets[k];
          return{
            r:Math.round(bk.r/bk.count),
            g:Math.round(bk.g/bk.count),
            b:Math.round(bk.b/bk.count),
            count:bk.count
          };
        });
        // Pilih warna paling vivid (saturation tertinggi)
        palette.sort(function(a,b){
          var satA=(Math.max(a.r,a.g,a.b)-Math.min(a.r,a.g,a.b))/Math.max(a.r,a.g,a.b);
          var satB=(Math.max(b.r,b.g,b.b)-Math.min(b.r,b.g,b.b))/Math.max(b.r,b.g,b.b);
          return satB-satA;
        });
        cb(palette);
      }catch(e){cb(null);}
    };
    img.onerror=function(){cb(null);};
    // Pakai proxy untuk bypass CORS
    img.src='https://wsrv.nl/?url='+encodeURIComponent(imgUrl)+'&w=80&h=80&output=jpg&q=60';
  }

  /* ── Apply color ke CSS variables ── */
  var _currentAnim=null;
  function applyColor(r,g,b,duration){
    duration=duration||700;
    var root=document.documentElement;
    var startR=parseInt(root.style.getPropertyValue('--aui-r'))||230;
    var startG=parseInt(root.style.getPropertyValue('--aui-g'))||57;
    var startB=parseInt(root.style.getPropertyValue('--aui-b'))||70;
    var start=null;
    if(_currentAnim)cancelAnimationFrame(_currentAnim);
    function step(ts){
      if(!start)start=ts;
      var p=Math.min((ts-start)/duration,1);
      // Ease out cubic
      var ep=1-Math.pow(1-p,3);
      var cr=Math.round(startR+(r-startR)*ep);
      var cg=Math.round(startG+(g-startG)*ep);
      var cb2=Math.round(startB+(b-startB)*ep);
      root.style.setProperty('--aui-r',cr);
      root.style.setProperty('--aui-g',cg);
      root.style.setProperty('--aui-b',cb2);
      if(p<1)_currentAnim=requestAnimationFrame(step);
    }
    _currentAnim=requestAnimationFrame(step);
  }

  /* ── Reset ke default ── */
  function resetColor(){
    applyColor(230,57,70,500);
    document.querySelector('.hdr')&&document.querySelector('.hdr').classList.remove('aui-active');
    document.querySelectorAll('.aui-active').forEach(function(el){el.classList.remove('aui-active')});
    document.body.classList.remove('aui-active-page');
    var bg=document.getElementById('auiDetailBg');
    if(bg){bg.classList.remove('show');setTimeout(function(){bg&&bg.remove();},800);}
    var palette=document.getElementById('auiPalette');
    if(palette)palette.classList.remove('show');
  }

  /* ── Show background bloom effect ── */
  function showDetailBg(r,g,b){
    var existing=document.getElementById('auiDetailBg');
    if(existing)existing.remove();
    var bg=document.createElement('div');
    bg.id='auiDetailBg';
    bg.className='aui-detail-bg';
    bg.innerHTML='<div class="aui-detail-bg-noise"></div><div class="aui-detail-bg-inner"></div>';
    document.body.insertBefore(bg,document.body.firstChild);
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){bg.classList.add('show');});
    });
  }

  /* ── Show palette chips ── */
  function showPalette(palette){
    var existing=document.getElementById('auiPalette');
    if(existing)existing.remove();
    if(!palette||!palette.length)return;
    var el=document.createElement('div');
    el.id='auiPalette';
    el.className='aui-palette';
    palette.slice(0,5).forEach(function(c){
      var chip=document.createElement('div');
      chip.className='aui-chip';
      chip.style.background='rgb('+c.r+','+c.g+','+c.b+')';
      el.appendChild(chip);
    });
    document.body.appendChild(el);
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){el.classList.add('show');});
    });
  }

  /* ── Main: activate adaptive color for a drama ── */
  var _cache={};
  function activateForDrama(imgUrl){
    if(!imgUrl)return;
    if(_cache[imgUrl]){
      _applyPalette(_cache[imgUrl]);
      return;
    }
    extractColors(imgUrl,function(palette){
      if(!palette||!palette.length)return;
      _cache[imgUrl]=palette;
      _applyPalette(palette);
    });
  }

  function _applyPalette(palette){
    var c=palette[0];
    applyColor(c.r,c.g,c.b,700);
    showDetailBg(c.r,c.g,c.b);
    showPalette(palette);
    // Activate CSS classes
    var hdr=document.querySelector('.hdr');
    if(hdr)hdr.classList.add('aui-active');
    document.body.classList.add('aui-active-page');
    // Delay sedikit biar DOM sudah siap
    setTimeout(function(){
      var dhero=document.querySelector('.dhero');
      if(dhero)dhero.classList.add('aui-active');
      var bwatch=document.querySelector('.bwatch');
      if(bwatch)bwatch.classList.add('aui-colored');
    },100);
  }

  /* ── Hook ke App._renderDetail ── */
  function hookApp(){
    if(typeof App==='undefined'){setTimeout(hookApp,200);return;}
    var origRender=App._renderDetail.bind(App);
    App._renderDetail=function(d,chaps){
      origRender(d,chaps);
      // Setelah render, aktifkan adaptive color
      if(d&&d.img){
        setTimeout(function(){activateForDrama(d.img);},80);
      }
    };
    // Reset saat kembali ke list
    var origGoToList=App.goToList.bind(App);
    App.goToList=function(){
      resetColor();
      return origGoToList.apply(App,arguments);
    };
    var origGoHome=App.goHome.bind(App);
    App.goHome=function(){
      resetColor();
      return origGoHome.apply(App,arguments);
    };
    var origOpenHistory=App.openHistory.bind(App);
    App.openHistory=function(){
      resetColor();
      return origOpenHistory.apply(App,arguments);
    };
    var origOpenWatchlist=App.openWatchlist.bind(App);
    App.openWatchlist=function(){
      resetColor();
      return origOpenWatchlist.apply(App,arguments);
    };
    console.log('%c🎨 Adaptive UI Color Engine Active','color:#a78bfa;font-weight:bold;font-size:12px');
  }

  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',hookApp);
  }else{
    setTimeout(hookApp,300);
  }
})();
</script>

<!-- ════ PARALLAX & DEPTH ENGINE ════ -->
<script>
(function(){
  'use strict';

  var isMobile=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  var isTouchDevice='ontouchstart' in window;
  var raf=window.requestAnimationFrame||function(cb){setTimeout(cb,16)};

  /* ── Platform color map for glow ── */
  var PLAT_GLOW={
    dramabox:'230,57,70',freereels:'124,58,237',melolo:'16,185,129',
    goodshort:'217,119,6',dramawave:'8,145,178',shortmax:'225,29,72',
    netshort:'124,58,237',dramabite:'234,88,12',flextv:'2,132,199',reelshort:'244,63,94'
  };

  /* ══ 1. CARD 3D TILT (desktop mouse) ══ */
  function initCardTilt(){
    if(isTouchDevice)return;
    document.addEventListener('mousemove',function(e){
      var card=e.target.closest('.card');
      if(!card){
        // reset semua active cards
        document.querySelectorAll('.card.plx-hover').forEach(function(c){resetCard(c)});
        return;
      }
      var rect=card.getBoundingClientRect();
      var cx=rect.left+rect.width/2;
      var cy=rect.top+rect.height/2;
      var dx=(e.clientX-cx)/(rect.width/2);   // -1 to 1
      var dy=(e.clientY-cy)/(rect.height/2);  // -1 to 1
      var tiltX=dy*-10;  // max 10deg
      var tiltY=dx*10;

      card.classList.add('plx-hover');
      card.style.transform='perspective(600px) rotateX('+tiltX+'deg) rotateY('+tiltY+'deg) translateY(-4px) scale(1.03)';
      card.style.transition='transform .08s ease,box-shadow .08s ease';

      // Parallax image dalam card
      var img=card.querySelector('.cimg img');
      if(img)img.style.transform='scale(1.1) translate('+(dx*-6)+'px,'+(dy*-6)+'px)';

      // Shine overlay
      var shine=card.querySelector('.card-shine');
      if(!shine){shine=document.createElement('div');shine.className='card-shine';card.appendChild(shine);}
      var px=((e.clientX-rect.left)/rect.width)*100;
      var py=((e.clientY-rect.top)/rect.height)*100;
      shine.style.background='radial-gradient(circle at '+px+'% '+py+'%, rgba(255,255,255,.15) 0%, transparent 60%)';
      shine.style.opacity='1';

      // Floating badges
      var score=card.querySelector('.cscore');
      var badge=card.querySelector('.cplatbadge');
      if(score)score.style.transform='translate('+(dx*3)+'px,'+(dy*3)+'px) scale(1.08)';
      if(badge)badge.style.transform='translate('+(dx*4)+'px,'+(dy*4)+'px) scale(1.05)';

      // Platform glow
      var src=typeof App!=='undefined'?App.src:'dramabox';
      var rgb=PLAT_GLOW[src]||'255,255,255';
      card.style.boxShadow='0 20px 50px rgba(0,0,0,.7), 0 0 30px rgba('+rgb+',.18)';
    },true);

    document.addEventListener('mouseleave',function(e){
      if(!e.relatedTarget)document.querySelectorAll('.card.plx-hover').forEach(function(c){resetCard(c)});
    });
  }

  function resetCard(card){
    card.classList.remove('plx-hover');
    card.style.transform='';
    card.style.transition='transform .35s ease,box-shadow .35s ease';
    card.style.boxShadow='';
    var img=card.querySelector('.cimg img');
    if(img){img.style.transform='';img.style.transition='transform .35s ease';}
    var shine=card.querySelector('.card-shine');
    if(shine)shine.style.opacity='0';
    var score=card.querySelector('.cscore');
    var badge=card.querySelector('.cplatbadge');
    if(score)score.style.transform='';
    if(badge)badge.style.transform='';
  }

  /* ══ 2. HERO PARALLAX (scroll) ══ */
  var heroTicking=false;
  function initHeroParallax(){
    window.addEventListener('scroll',function(){
      if(heroTicking)return;
      heroTicking=true;
      raf(function(){
        var hero=document.getElementById('heroCar');
        if(!hero){heroTicking=false;return;}
        var rect=hero.getBoundingClientRect();
        var progress=(-rect.top)/(rect.height||1);
        if(progress>-0.5&&progress<1.5){
          // Background image moves at 40% of scroll speed = parallax
          var imgs=hero.querySelectorAll('.hero-slide-img');
          imgs.forEach(function(img){
            var offset=progress*35; // px shift
            img.style.transform='scale(1.12) translateY('+offset+'px)';
            img.style.transition='none';
          });
          // Content moves UP faster (foreground)
          var contents=hero.querySelectorAll('.hero-slide-content');
          contents.forEach(function(c){
            c.style.transform='translateY('+(-progress*18)+'px)';
            c.style.transition='none';
          });
        }
        heroTicking=false;
      });
    },{passive:true});
  }

  /* ══ 3. GYROSCOPE PARALLAX (mobile) ══ */
  function initGyroParallax(){
    if(!isMobile)return;
    if(!window.DeviceOrientationEvent)return;
    var gx=0,gy=0,smoothX=0,smoothY=0;
    var gyroTicking=false;

    function requestGyro(){
      if(typeof DeviceOrientationEvent.requestPermission==='function'){
        // iOS 13+ perlu permission
        DeviceOrientationEvent.requestPermission().then(function(s){
          if(s==='granted')window.addEventListener('deviceorientation',handleGyro,{passive:true});
        }).catch(function(){});
      }else{
        window.addEventListener('deviceorientation',handleGyro,{passive:true});
      }
    }

    function handleGyro(e){
      gx=(e.gamma||0)/30;  // -1 to 1
      gy=((e.beta||0)-45)/45;
      if(!gyroTicking){
        gyroTicking=true;
        raf(function(){
          smoothX+=(gx-smoothX)*0.08;
          smoothY+=(gy-smoothY)*0.08;
          // Apply to hero carousel content
          var contents=document.querySelectorAll('.hero-slide.active .hero-slide-content');
          contents.forEach(function(c){
            c.style.transform='translate('+(smoothX*8)+'px,'+(smoothY*6)+'px)';
            c.style.transition='none';
          });
          var imgs=document.querySelectorAll('.hero-slide.active .hero-slide-img');
          imgs.forEach(function(img){
            img.style.transform='scale(1.1) translate('+(smoothX*-12)+'px,'+(smoothY*-8)+'px)';
            img.style.transition='none';
          });
          gyroTicking=false;
        });
      }
    }

    // Request gyro on first touch (avoid iOS permission popup on load)
    document.addEventListener('touchstart',function handler(){
      document.removeEventListener('touchstart',handler);
      requestGyro();
    },{once:true,passive:true});
  }

  /* ══ 4. TOUCH CARD TILT (mobile) ══ */
  function initTouchTilt(){
    if(!isTouchDevice)return;
    var activeCard=null,startX=0,startY=0;

    document.addEventListener('touchstart',function(e){
      activeCard=e.target.closest('.card');
      if(!activeCard)return;
      startX=e.touches[0].clientX;
      startY=e.touches[0].clientY;
    },{passive:true});

    document.addEventListener('touchmove',function(e){
      if(!activeCard)return;
      var dx=(e.touches[0].clientX-startX)/40;
      var dy=(e.touches[0].clientY-startY)/40;
      var tilt=Math.min(Math.max(Math.sqrt(dx*dx+dy*dy),0),1);
      if(tilt<0.1)return;
      activeCard.style.transform='perspective(500px) rotateX('+(-dy*5)+'deg) rotateY('+(dx*5)+'deg) scale(1.02)';
      activeCard.style.transition='none';
      var img=activeCard.querySelector('.cimg img');
      if(img){img.style.transform='scale(1.08) translate('+(dx*-4)+'px,'+(dy*-4)+'px)';img.style.transition='none';}
    },{passive:true});

    document.addEventListener('touchend',function(){
      if(!activeCard)return;
      activeCard.style.transform='';
      activeCard.style.transition='transform .4s cubic-bezier(.22,1,.36,1)';
      var img=activeCard.querySelector('.cimg img');
      if(img){img.style.transform='';img.style.transition='transform .4s ease';}
      activeCard=null;
    },{passive:true});
  }

  /* ══ 5. SCROLL REVEAL (intersection observer) ══ */
  function initScrollReveal(){
    if(!window.IntersectionObserver)return;
    var obs=new IntersectionObserver(function(entries){
      entries.forEach(function(entry){
        if(entry.isIntersecting){
          entry.target.classList.add('plx-in');
          obs.unobserve(entry.target);
        }
      });
    },{threshold:0.1,rootMargin:'0px 0px -30px 0px'});

    // Observe existing sections
    function observeSections(){
      document.querySelectorAll('.stitle,.genre-bar,.trending-section,.rot-banner,.resume-banner').forEach(function(el){
        if(!el.classList.contains('plx-section')&&!el.classList.contains('plx-in')){
          el.classList.add('plx-section');
          obs.observe(el);
        }
      });
    }
    observeSections();
    // Re-observe after dynamic renders
    var mutObs=new MutationObserver(function(){observeSections()});
    var main=document.getElementById('mainContent');
    if(main)mutObs.observe(main,{childList:true,subtree:false});
  }

  /* ══ 6. LOGO MAGNETIC EFFECT ══ */
  function initLogoMagnetic(){
    if(isTouchDevice)return;
    var logo=document.querySelector('.logo');
    if(!logo)return;
    logo.addEventListener('mousemove',function(e){
      var rect=logo.getBoundingClientRect();
      var dx=(e.clientX-(rect.left+rect.width/2))/rect.width;
      var dy=(e.clientY-(rect.top+rect.height/2))/rect.height;
      logo.style.transform='translate('+(dx*6)+'px,'+(dy*4)+'px)';
      var ico=logo.querySelector('i');
      if(ico)ico.style.transform='rotate('+(dx*15)+'deg) scale(1.15)';
    });
    logo.addEventListener('mouseleave',function(){
      logo.style.transform='';
      var ico=logo.querySelector('i');
      if(ico)ico.style.transform='';
    });
  }

  /* ══ 7. STAGGER CARD ANIMATION on render ══ */
  var gridObs=null;
  function initGridStagger(){
    if(!window.MutationObserver)return;
    var main=document.getElementById('mainContent');
    if(!main)return;
    gridObs=new MutationObserver(function(mutations){
      mutations.forEach(function(m){
        m.addedNodes.forEach(function(node){
          if(node.nodeType!==1)return;
          var cards=node.querySelectorAll?node.querySelectorAll('.card'):[];
          var delay=0;
          cards.forEach(function(card,i){
            card.style.animationDelay=(i*30)+'ms';
            card.style.animationDuration='.45s';
          });
          // Also observe sections for reveal
          setTimeout(initScrollReveal,50);
        });
      });
    });
    gridObs.observe(main,{childList:true,subtree:false});
  }

  /* ══ INIT ALL ══ */
  function init(){
    initCardTilt();
    initHeroParallax();
    initGyroParallax();
    initTouchTilt();
    initScrollReveal();
    initLogoMagnetic();
    initGridStagger();
    console.log('%c✨ Parallax Engine Active','color:#e63946;font-weight:bold;font-size:12px');
  }

  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',init);
  }else{
    init();
  }
})();
</script>
</body>
