<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#000;--bg2:#0c0c0c;--bg3:#111;--bg4:#161616;--bg5:#1c1c1c;
  --accent:#fff;--red:#e63946;--gold:#c9a84c;
  --text:#ededed;--text2:#888;--text3:#444;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.04);
  --radius:6px;--radius2:10px;--shadow:0 4px 24px rgba(0,0,0,.6);--tr:all .18s ease;
  --db:#e63946;--fr:#7c3aed;--ml:#10b981;--gs:#d97706;
  --dw:#0891b2;--sm:#e11d48;--ns:#7c3aed;--db2:#ea580c;--fx:#0284c7;--rs:#f43f5e;
}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body.noscroll{overflow:hidden}
button{border:none;outline:none;cursor:pointer;font-family:inherit}
input{font-family:inherit;outline:none;border:none}
a{text-decoration:none;color:inherit}
::selection{background:rgba(255,255,255,.15);color:#fff}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:2px}
.skel{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:200% 100%;animation:skel-shimmer 1.4s infinite;border-radius:var(--radius)}
@keyframes skel-shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{background:var(--bg2);border-radius:0;overflow:hidden}
.skel-img{aspect-ratio:2/3;background:var(--bg3);animation:skel-shimmer 1.4s infinite;background-size:200% 100%;background-image:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%)}
.skel-line{height:10px;border-radius:3px;margin:8px 10px 4px;background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:200% 100%;animation:skel-shimmer 1.4s infinite}
.skel-line.short{width:60%;height:8px;margin:0 10px 12px}
.hdr{position:sticky;top:0;z-index:100;background:rgba(0,0,0,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border2)}
.hdr-in{max-width:1440px;margin:0 auto;padding:0 20px;height:56px;display:flex;align-items:center;gap:8px}
.logo{display:flex;align-items:center;gap:7px;font-size:1rem;font-weight:700;cursor:pointer;flex-shrink:0;color:#fff}
.logo i{color:var(--red);font-size:.95rem}
.plat-btn{display:flex;align-items:center;gap:6px;padding:5px 10px 5px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);font-size:.75rem;font-weight:500;color:var(--text2);cursor:pointer;transition:var(--tr);flex-shrink:0;white-space:nowrap}
.plat-btn:hover{border-color:rgba(255,255,255,.16);color:var(--text)}
.plat-btn .pdot{width:6px;height:6px;border-radius:50%;background:var(--red);display:inline-block}
#fbSyncBadge{width:6px;height:6px;border-radius:50%;background:#10b981;display:inline-block;margin-left:2px;flex-shrink:0}
.plat-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px);padding:20px}
.plat-modal-bg.open{display:flex}
.plat-modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);width:100%;max-width:280px;overflow:hidden}
.plat-modal-hdr{padding:14px 16px;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between}
.plat-modal-hdr h2{font-size:.7rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
.plat-close{width:24px;height:24px;border-radius:var(--radius);background:var(--bg3);color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:.65rem}
.plat-grid{display:flex;flex-direction:column}
.plat-card{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;transition:background .1s;background:none}
.plat-card:hover{background:var(--bg3)}
.plat-card-ico{width:32px;height:32px;border-radius:7px;flex-shrink:0;overflow:hidden}
.plat-card-name{font-size:.82rem;font-weight:500;color:var(--text)}
.plat-check{width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.5rem;flex-shrink:0;margin-left:auto;opacity:0}
.plat-card.selected .plat-check{opacity:1;background:var(--text);color:#000}
.plat-badge-new{font-size:.5rem;font-weight:700;padding:1px 5px;border-radius:3px;background:var(--bg5);color:var(--text3);border:1px solid var(--border)}
.nav{display:flex;gap:0;flex-shrink:0;overflow-x:auto}
.nav::-webkit-scrollbar{display:none}
.nb{padding:6px 11px;border-radius:var(--radius);font-size:.76rem;font-weight:500;color:var(--text3);cursor:pointer;transition:var(--tr);white-space:nowrap;background:none}
.nb.on{color:var(--text);background:var(--bg3);font-weight:600}
/* ══ SEARCH EXPAND ══ */
.swrap{flex:1;max-width:320px;margin-left:auto;position:relative}
.swrap.mobile-hidden{display:none}
.search-icon-btn{width:34px;height:34px;border-radius:var(--radius);background:var(--bg3);border:1px solid var(--border);color:var(--text2);display:none;align-items:center;justify-content:center;font-size:.85rem;cursor:pointer;margin-left:auto;flex-shrink:0;transition:var(--tr)}
.search-icon-btn:hover{color:var(--text);border-color:rgba(255,255,255,.2)}
.search-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:none;backdrop-filter:blur(4px)}
.search-overlay.show{display:block}
.search-expand-wrap{position:fixed;top:0;left:0;right:0;z-index:301;background:rgba(0,0,0,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:10px 14px;display:none;align-items:center;gap:10px;transform:translateY(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
.search-expand-wrap.show{display:flex;transform:translateY(0)}
.search-expand-input{flex:1;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);color:var(--text);font-size:.9rem;font-family:inherit}
.search-expand-input:focus{border-color:rgba(255,255,255,.25);outline:none}
.search-expand-cancel{color:var(--text2);font-size:.8rem;font-weight:600;cursor:pointer;background:none;border:none;white-space:nowrap;padding:4px 0;font-family:inherit}
.search-expand-go{padding:9px 16px;background:#fff;color:#000;border-radius:var(--radius);font-size:.78rem;font-weight:700;border:none;cursor:pointer;flex-shrink:0;font-family:inherit}
@media(max-width:768px){
  .swrap{display:none}
  .search-icon-btn{display:flex}
}

/* ══ LONG PRESS PREVIEW ══ */
.lp-overlay{position:fixed;inset:0;z-index:800;display:none;align-items:center;justify-content:center;padding:20px}
.lp-overlay.show{display:flex}
.lp-bg{position:absolute;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(12px)}
.lp-card{position:relative;z-index:1;width:100%;max-width:300px;background:var(--bg2);border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,.1);box-shadow:0 24px 60px rgba(0,0,0,.8);animation:lpIn .2s cubic-bezier(.34,1.56,.64,1)}
@keyframes lpIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
.lp-banner{position:relative;aspect-ratio:16/9;overflow:hidden;background:var(--bg3)}
.lp-banner img{width:100%;height:100%;object-fit:cover;display:block}
.lp-banner-grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.9) 0%,transparent 60%)}
.lp-body{padding:14px 16px 16px}
.lp-platform{display:flex;align-items:center;gap:5px;margin-bottom:6px}
.lp-platform img{width:16px;height:16px;border-radius:3px;object-fit:cover}
.lp-platform span{font-size:.62rem;color:var(--text3);font-weight:500}
.lp-title{font-size:1rem;font-weight:800;color:var(--text);line-height:1.3;margin-bottom:8px}
.lp-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.lp-tag{font-size:.6rem;color:var(--text3);background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:2px 8px}
.lp-stats{display:flex;gap:12px;margin-bottom:14px}
.lp-stat{display:flex;align-items:center;gap:4px;font-size:.7rem;color:var(--text2)}
.lp-stat i{font-size:.6rem;color:var(--text3)}
.lp-stat.score{color:#f59e0b}
.lp-actions{display:flex;gap:8px}
.lp-btn-watch{flex:1;padding:11px;background:#fff;color:#000;border-radius:24px;font-size:.8rem;font-weight:700;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.lp-btn-detail{padding:11px 16px;background:var(--bg3);color:var(--text2);border-radius:24px;font-size:.8rem;font-weight:600;border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:6px}
.lp-close-hint{text-align:center;font-size:.62rem;color:var(--text3);margin-top:10px}

/* ══ GLASSMORPHISM DETAIL ══ */
.dsts-glass{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.ds-glass{display:flex;align-items:center;gap:5px;font-size:.75rem;color:var(--text2);background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(12px);padding:6px 12px;border-radius:20px}
.ds-glass i{font-size:.62rem;color:var(--text3)}
.ds-glass.score{color:#f59e0b;background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.2)}
.d-actions-glass{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(16px);border-radius:16px;padding:12px}
.sbox i.si{position:absolute;left:10px;color:var(--text3);font-size:.72rem}
.sbox input{width:100%;padding:7px 60px 7px 30px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:.78rem;transition:var(--tr)}
.sbox input:focus{border-color:rgba(255,255,255,.2)}
.sbox input::placeholder{color:var(--text3)}
.sgo{position:absolute;right:4px;padding:4px 10px;background:var(--text);color:#000;border-radius:4px;font-size:.7rem;font-weight:600}
.sugbox{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);display:none;z-index:200;max-height:320px;overflow-y:auto}
.sugbox.show{display:block}
.sugi{padding:9px 13px;cursor:pointer;transition:background .1s;display:flex;align-items:center;gap:8px;font-size:.78rem;color:var(--text2)}
.sugi:hover{background:var(--bg3);color:var(--text)}
/* ══ BOTTOM NAV REDESIGN — MODERN PILL ══ */
.mbar{
  display:none;position:fixed;bottom:0;left:0;right:0;
  background:rgba(8,8,8,.92);
  backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
  border-top:1px solid rgba(255,255,255,.07);
  z-index:100;
  padding:6px 8px calc(6px + env(safe-area-inset-bottom));
}
.mbar-in{display:flex;justify-content:space-around;position:relative;align-items:center}
/* Active pill indicator */
.mbar-pill{
  position:absolute;
  height:36px;border-radius:18px;
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.08);
  transition:left .3s cubic-bezier(.34,1.56,.64,1),width .3s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;z-index:0;
  backdrop-filter:blur(8px);
}
.mb{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 10px;
  color:var(--text3);font-size:.5rem;font-weight:600;
  cursor:pointer;background:none;white-space:nowrap;
  position:relative;
  transition:color .2s ease;
  flex:1;border-radius:18px;z-index:1;
  letter-spacing:.02em;text-transform:uppercase;
}
.mb i{
  font-size:.95rem;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1),color .2s;
  display:block;
}
.mb.on{color:var(--text)}
.mb.premium-tab{color:var(--gold)}
.mb.premium-tab.on{color:var(--gold)}
/* Remove old indicator line */
.mb::after{display:none}
/* Icon bounce on active */
@keyframes mbPop{
  0%{transform:scale(1)}
  30%{transform:scale(1.35) translateY(-2px)}
  60%{transform:scale(.9) translateY(1px)}
  100%{transform:scale(1.1) translateY(0)}
}
.mb.on i{animation:mbPop .38s cubic-bezier(.34,1.56,.64,1) forwards}
/* Label fade */
.mb span{
  transition:opacity .2s,transform .2s;
  opacity:.6;transform:translateY(0);
}
.mb.on span{opacity:1;transform:translateY(0)}
.main{max-width:1440px;margin:0 auto;padding:24px 20px;min-height:calc(100vh - 120px)}
.stitle{font-size:.78rem;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:7px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.src-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:3px;font-size:.62rem;font-weight:600;margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em;border:1px solid var(--border)}
.src-badge.db{color:var(--db);border-color:rgba(230,57,70,.2)}
.src-badge.fr{color:var(--fr);border-color:rgba(124,58,237,.2)}
.src-badge.ml{color:var(--ml);border-color:rgba(16,185,129,.2)}
.src-badge.gs{color:var(--gs);border-color:rgba(217,119,6,.2)}
.src-badge.dw{color:var(--dw);border-color:rgba(8,145,178,.2)}
.src-badge.sm{color:var(--sm);border-color:rgba(225,29,72,.2)}
.src-badge.ns{color:var(--ns);border-color:rgba(124,58,237,.2)}
.src-badge.db2{color:var(--db2);border-color:rgba(234,88,12,.2)}
.src-badge.fx{color:var(--fx);border-color:rgba(2,132,199,.2)}
.src-badge.rs{color:var(--rs);border-color:rgba(244,63,94,.2)}
.fbtn{padding:5px 12px;background:none;border:1px solid var(--border);border-radius:var(--radius);font-size:.72rem;color:var(--text2);cursor:pointer;transition:var(--tr)}
.fbtn.on{background:var(--text);border-color:var(--text);color:#000;font-weight:600}
/* ══ CARD REDESIGN — SINEMATIK ══ */
@keyframes cardIn{
  from{opacity:0;transform:translateY(28px) scale(.94)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:12px;padding:4px 0}
.card{
  position:relative;cursor:pointer;background:var(--bg2);
  border-radius:16px;overflow:hidden;-webkit-tap-highlight-color:transparent;
  transition:transform .25s cubic-bezier(.34,1.56,.64,1),box-shadow .25s ease,border-color .22s ease;
  opacity:0;animation:cardIn .42s cubic-bezier(.22,1,.36,1) forwards;
  border:1px solid rgba(255,255,255,.05);
  box-shadow:0 2px 12px rgba(0,0,0,.35);
}
.card:hover{
  transform:translateY(-6px) scale(1.02);
  box-shadow:0 20px 48px rgba(0,0,0,.65),0 0 0 1px rgba(255,255,255,.1);
  border-color:rgba(255,255,255,.13);
}
.card:active{transform:scale(.96) translateY(0);box-shadow:0 2px 8px rgba(0,0,0,.4)}
/* Ripple — lebih halus */
.card-ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.13);transform:scale(0);animation:rippleAnim .65s cubic-bezier(.4,0,.2,1) forwards;pointer-events:none;z-index:10}
@keyframes rippleAnim{to{transform:scale(5);opacity:0}}

/* ══ TRENDING ROW ══ */
.trending-section{margin-bottom:20px}
.trending-title{font-size:.72rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;display:flex;align-items:center;gap:6px;margin-bottom:10px}
.trending-title .live-dot{width:6px;height:6px;border-radius:50%;background:var(--red);display:inline-block;animation:tdpulse 1.8s infinite;flex-shrink:0}
@keyframes tdpulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(1.6)}}
.trending-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.trending-scroll::-webkit-scrollbar{display:none}
.tcard{flex-shrink:0;width:96px;position:relative;cursor:pointer;border-radius:8px;overflow:hidden;background:var(--bg2)}
.tcard-img{position:relative;aspect-ratio:2/3;overflow:hidden;background:var(--bg3)}
.tcard-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s ease}
.tcard:active .tcard-img img{transform:scale(1.06)}
.tcard-grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.92) 0%,transparent 55%)}
.tcard-num{position:absolute;top:5px;left:6px;font-size:.7rem;font-weight:800;color:rgba(255,255,255,.45);line-height:1;font-style:italic}
.tcard-info{position:absolute;bottom:0;left:0;right:0;padding:6px 6px 5px}
.tcard-name{font-size:.62rem;font-weight:700;color:#fff;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;text-shadow:0 1px 4px rgba(0,0,0,.8)}

/* ══ BOTTOM SHEET PLATFORM SWITCHER ══ */
.plat-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px)}
.plat-modal-bg.open{display:flex}
.plat-modal{background:var(--bg2);border:1px solid var(--border);border-top-left-radius:20px;border-top-right-radius:20px;width:100%;max-width:480px;overflow:hidden;transform:translateY(100%);transition:transform .32s cubic-bezier(.4,0,.2,1)}
.plat-modal-bg.open .plat-modal{transform:translateY(0)}
.plat-modal-handle{width:36px;height:4px;border-radius:2px;background:var(--bg5);margin:10px auto 2px}
.plat-modal-hdr{padding:10px 16px 12px;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between}
.plat-modal-hdr h2{font-size:.7rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
.plat-close{width:24px;height:24px;border-radius:var(--radius);background:var(--bg3);color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:.65rem}
.plat-grid{display:flex;flex-direction:column;max-height:58vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom)}
/* ══ CARD IMAGE & OVERLAY ══ */
.cimg{position:relative;aspect-ratio:2/3;overflow:hidden;background:var(--bg3);border-radius:0}
.cimg img{
  width:100%;height:100%;object-fit:cover;
  transition:transform .5s cubic-bezier(.4,0,.2,1),opacity .3s;
  display:block;opacity:1
}
.cimg img.img-loading{opacity:0;filter:blur(4px)}
.cimg img.img-loaded,.cimg img.loaded{opacity:1;filter:none}
.card:hover .cimg img{transform:scale(1.09)}
/* Gradient overlay — lebih dramatis */
.cgrad{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.96) 0%,rgba(0,0,0,.5) 38%,rgba(0,0,0,.1) 65%,transparent 100%);z-index:1}
/* Info overlay */
.cinfo-overlay{position:absolute;bottom:0;left:0;right:0;z-index:2;padding:10px 9px 8px}
.cname-overlay{font-size:.8rem;font-weight:700;line-height:1.3;color:#fff;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:5px;text-shadow:0 1px 6px rgba(0,0,0,.9)}
.cmeta-overlay{display:flex;align-items:center;justify-content:space-between}
.cviews{display:flex;align-items:center;gap:3px;font-size:.6rem;color:rgba(255,255,255,.75);font-weight:500}
.cviews i{color:#ff5566;font-size:.56rem}

.cbadge{display:none}

.d-body{padding:60px 16px 0}

.d-platform-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.d-plat-ico{width:18px;height:18px;border-radius:4px;overflow:hidden;flex-shrink:0}

.ds{display:flex;align-items:center;gap:5px;font-size:.75rem;color:var(--text2)}

.d-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.bwatch{padding:11px 22px;background:#fff;color:#000;border-radius:24px;font-size:.82rem;font-weight:700;display:inline-flex;align-items:center;gap:7px;transition:var(--tr);flex:1;justify-content:center;min-width:120px}

.bfav{padding:11px 16px;background:var(--bg3);color:var(--text2);border-radius:24px;font-size:.8rem;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:var(--tr);border:1px solid var(--border);cursor:pointer;justify-content:center}
.bfav.saved{color:var(--gold);border-color:rgba(201,168,76,.3);background:rgba(201,168,76,.06)}

/* Divider */

/* Resume banner */
.cw-resume-banner{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:16px;cursor:pointer;transition:var(--tr)}

.back{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;background:none;color:var(--text2);border-radius:var(--radius);font-size:.75rem;font-weight:500;cursor:pointer;margin-bottom:14px;border:1px solid var(--border);transition:var(--tr)}
/* ══ TOAST — MORE STYLISH ══ */
.toast{
  position:fixed;bottom:90px;left:50%;
  transform:translateX(-50%) translateY(16px);
  background:rgba(20,20,20,.95);
  color:var(--text);
  padding:11px 18px;border-radius:14px;
  font-size:.78rem;font-weight:500;
  z-index:1000;opacity:0;
  transition:opacity .25s cubic-bezier(.22,1,.36,1),transform .25s cubic-bezier(.22,1,.36,1);
  pointer-events:none;white-space:nowrap;
  border:1px solid rgba(255,255,255,.1);
  display:flex;align-items:center;gap:9px;
  box-shadow:0 8px 32px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.05);
  backdrop-filter:blur(20px);
}

  box-shadow:0 8px 32px rgba(16,185,129,.15);
}

  border-color:rgba(230,57,70,.35);
  background:rgba(230,57,70,.14);
  box-shadow:0 8px 32px rgba(230,57,70,.15);
}

  box-shadow:0 8px 32px rgba(217,119,6,.15);
}

.back{
  display:inline-flex;align-items:center;gap:6px;

}

/* ══ MICRO-INTERACTIONS ══ */

}

}

.tk-title-main{font-size:.82rem;font-weight:700;color:#fff;line-height:1.2;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.tk-title-ep{font-size:.65rem;color:rgba(255,255,255,.55);margin-top:2px}
.tk-speed{width:38px;height:38px;border-radius:50%;background:rgba(0,0,0,.45);color:rgba(255,255,255,.85);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1);flex-shrink:0;cursor:pointer}

/* Right side buttons — MeloLo style */
.tk-side{position:absolute;right:12px;bottom:calc(max(16px,env(safe-area-inset-bottom)) + 80px);z-index:10;display:flex;flex-direction:column;gap:12px;align-items:center}
.tk-sb{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;color:rgba(255,255,255,.9);font-size:.52rem;font-weight:600;letter-spacing:.01em;cursor:pointer}
.tk-sb-ico{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.12);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;font-size:.95rem;border:1.5px solid rgba(255,255,255,.15);transition:transform .15s,background .15s}
.tk-sb:active .tk-sb-ico{transform:scale(.88);background:rgba(255,255,255,.2)}
.tk-sb.wl-active .tk-sb-ico{background:rgba(201,168,76,.25);border-color:rgba(201,168,76,.5);color:var(--gold)}
.tk-sb-lbl{color:rgba(255,255,255,.7);font-size:.52rem}

/* Bottom info */
.tk-bottom{position:absolute;bottom:max(16px,env(safe-area-inset-bottom));left:14px;right:72px;z-index:10;padding-bottom:8px}
.tk-dname{font-size:1rem;font-weight:700;color:#fff;margin-bottom:4px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;text-shadow:0 1px 8px rgba(0,0,0,.5)}
.tk-epsub{font-size:.75rem;color:rgba(255,255,255,.6);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.tk-ep-dot{width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,.35)}

/* Progress bar MeloLo style — at very bottom */
.tk-prog{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(255,255,255,.15);z-index:11}
.tk-prog-bar{height:100%;background:linear-gradient(90deg,#e63946,#ff6b6b);width:0%;transition:width .15s linear;border-radius:0 2px 2px 0}

/* Episode nav arrows — subtle swipe hint */
.tk-nav-hint{position:absolute;left:50%;transform:translateX(-50%);z-index:5;display:flex;flex-direction:column;align-items:center;gap:3px;pointer-events:none}
.tk-nav-hint-top{top:110px}
.tk-nav-hint-bot{bottom:100px}
.tk-nav-hint i{font-size:.7rem;color:rgba(255,255,255,.2);animation:tkNavPulse 2.5s infinite ease-in-out}
@keyframes tkNavPulse{0%,100%{opacity:.2}50%{opacity:.55}}

/* Center tap feedback */
.tk-pp{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:6;pointer-events:none}
.tk-pp-ring{width:70px;height:70px;border-radius:50%;background:rgba(0,0,0,.35);backdrop-filter:blur(8px);border:2px solid rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:#fff;opacity:0;transform:scale(1.4);transition:all .18s ease-out}
.tk-pp.show .tk-pp-ring{opacity:1;transform:scale(1)}

/* Seek indicator */
.tk-seek{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:6;pointer-events:none}
.tk-seek-ind{display:flex;align-items:center;gap:7px;background:rgba(0,0,0,.65);padding:11px 18px;border-radius:24px;opacity:0;transform:scale(.85);transition:all .15s ease-out;backdrop-filter:blur(8px)}
.tk-seek-ind.show{opacity:1;transform:scale(1)}
.tk-seek-ind i{font-size:1rem;color:#fff}
.tk-seek-ind span{font-size:.9rem;font-weight:700;color:#fff}

/* Loading */
.tk-load{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:8;background:rgba(0,0,0,.35)}
.tk-load .sp{width:40px;height:40px;border:3px solid rgba(255,255,255,.12);border-top-color:rgba(255,255,255,.7);border-radius:50%;animation:spin .65s linear infinite}

/* Error */
.tk-err{position:absolute;inset:0;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:7;color:rgba(255,255,255,.55);font-size:.85rem;display:none;text-align:center;padding:20px}
.tk-err.show{display:flex}
.tk-err-ico{width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:rgba(255,255,255,.3);margin-bottom:4px}
.tk-err p{color:rgba(255,255,255,.65);font-size:.85rem;margin:0}
.tk-err button{padding:9px 22px;border-radius:24px;background:rgba(255,255,255,.9);color:#000;font-size:.78rem;font-weight:700;margin-top:4px}

/* Episode panel */
.tk-epanel{position:absolute;bottom:0;left:0;right:0;max-height:65vh;background:rgba(10,10,10,.98);backdrop-filter:blur(28px);border-radius:20px 20px 0 0;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:20;display:flex;flex-direction:column;border-top:1px solid rgba(255,255,255,.08)}
.tk-epanel.open{transform:translateY(0)}
.tk-ep-handle{width:40px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin:12px auto 0}
/* MeloLo header */
.tk-eph2{display:flex;align-items:center;gap:10px;padding:12px 14px 10px;border-bottom:1px solid rgba(255,255,255,.06)}
.tk-eph2-poster{width:46px;height:62px;border-radius:7px;overflow:hidden;flex-shrink:0;background:rgba(255,255,255,.08)}
.tk-eph2-poster img{width:100%;height:100%;object-fit:cover;display:block}
.tk-eph2-info{flex:1;min-width:0}
.tk-eph2-name{font-size:.85rem;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.tk-eph2-sub{font-size:.7rem;color:rgba(255,255,255,.4)}
.tk-eph2-close{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.08);color:rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;font-size:.75rem;flex-shrink:0}
/* range tabs */
.tk-ep-tabs{display:flex;gap:6px;padding:10px 14px 0;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.tk-ep-tabs::-webkit-scrollbar{display:none}
.tk-ep-tab{padding:5px 14px;border-radius:20px;font-size:.73rem;font-weight:600;color:rgba(255,255,255,.45);background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.07);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.tk-ep-tab.on{background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.22)}
/* episode grid */
.tk-epl{overflow-y:auto;padding:10px 10px 24px;display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.tk-epl::-webkit-scrollbar{display:none}
.tk-epb{padding:11px 4px 8px;border-radius:10px;background:rgba(255,255,255,.07);color:rgba(255,255,255,.45);text-align:center;font-size:.75rem;font-weight:500;border:1px solid transparent;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:2px}
.tk-epb:hover{background:rgba(255,255,255,.12);color:#fff}
.tk-epb.on{background:rgba(201,168,76,.2);color:#c9a84c;border-color:rgba(201,168,76,.35);font-weight:700}
/* equalizer for playing episode */
.tk-eq{display:flex;gap:1.5px;align-items:flex-end;height:8px}
.tk-eq span{width:2.5px;border-radius:1px;background:#c9a84c;animation:tkEqAnim .6s ease-in-out infinite alternate}
.tk-eq span:nth-child(1){height:4px;animation-delay:0s}
.tk-eq span:nth-child(2){height:8px;animation-delay:.15s}
.tk-eq span:nth-child(3){height:5px;animation-delay:.3s}
@keyframes tkEqAnim{0%{transform:scaleY(.35)}100%{transform:scaleY(1)}}
.tk-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:15;display:none}
.tk-overlay.show{display:block}

/* Swipe transition */
.tk-anim-up{animation:tkUp .22s ease}
.tk-anim-down{animation:tkDn .22s ease}
@keyframes tkUp{from{opacity:.2;transform:translateY(15%)}to{opacity:1;transform:translateY(0)}}
@keyframes tkDn{from{opacity:.2;transform:translateY(-15%)}to{opacity:1;transform:translateY(0)}}
/* ══ FOOTER BARU — GLASSMORPHISM COMPACT ══ */
.foot{margin-top:48px;padding-bottom:env(safe-area-inset-bottom)}
.foot-glass{background:linear-gradient(180deg,transparent 0%,rgba(255,255,255,.02) 100%);border-top:1px solid rgba(255,255,255,.06);padding:28px 20px 20px;max-width:1440px;margin:0 auto}

/* Stats row */
.foot-stats{display:flex;justify-content:center;gap:0;margin-bottom:28px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:14px;overflow:hidden}
.foot-stat-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:16px 8px;border-right:1px solid rgba(255,255,255,.05);position:relative}
.foot-stat-item:last-child{border-right:none}
.foot-stat-num{font-size:1.2rem;font-weight:800;color:var(--text);line-height:1}
.foot-stat-num span{font-size:.65rem;font-weight:600;color:var(--red);margin-left:1px}
.foot-stat-lbl{font-size:.58rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-weight:500}

/* Brand center */
.foot-brand-center{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:24px;text-align:center}
.foot-logo-big{display:flex;align-items:center;gap:8px;font-size:1.1rem;font-weight:800;color:var(--text)}
.foot-logo-big i{color:var(--red);font-size:1rem}
.foot-tagline-center{font-size:.72rem;color:var(--text3);line-height:1.6;max-width:260px}

/* Platform pills scroll */
.foot-plats{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
.foot-plats::-webkit-scrollbar{display:none}
.foot-plat-pill{display:flex;align-items:center;gap:5px;padding:4px 10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:20px;font-size:.62rem;color:var(--text3);white-space:nowrap;cursor:pointer;transition:all .15s}
.foot-plat-pill:hover{background:rgba(255,255,255,.08);color:var(--text);border-color:rgba(255,255,255,.14)}
.foot-plat-pill img{width:14px;height:14px;border-radius:3px;object-fit:cover}

/* Action buttons */
.foot-actions{display:flex;gap:8px;margin-bottom:24px;justify-content:center}
.foot-act-saw{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;background:#fff;color:#000;border-radius:24px;font-size:.78rem;font-weight:700;border:none;cursor:pointer;transition:var(--tr)}
.foot-act-saw:hover{background:rgba(255,255,255,.9)}
.foot-act-tg{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:var(--text2);border-radius:24px;font-size:.78rem;font-weight:500;cursor:pointer;transition:var(--tr);text-decoration:none}
.foot-act-tg:hover{background:rgba(255,255,255,.12);color:var(--text)}

/* Nav quick links */
.foot-nav{display:flex;justify-content:center;gap:6px 20px;margin-bottom:24px;flex-wrap:wrap;padding:0 16px}
.foot-nav-link{font-size:.72rem;color:var(--text3);cursor:pointer;transition:color .15s;padding:4px 0}
.foot-nav-link:hover{color:var(--text)}

/* Bottom bar */
.foot-bottom-bar{border-top:1px solid rgba(255,255,255,.05);padding-top:18px;display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center;padding-bottom:8px}
.foot-copy-new{font-size:.68rem;color:var(--text3);line-height:1.5}
.foot-copy-new b{color:var(--text2)}
.foot-made{font-size:.6rem;color:var(--text3);opacity:.45}

@media(max-width:768px){
  .foot-stats{margin-bottom:20px}
  .foot-stat-num{font-size:1rem}
  .foot-plats{justify-content:flex-start}
  .foot-actions{flex-direction:column;align-items:center}
  .foot-act-saw,.foot-act-tg{width:100%;max-width:280px;justify-content:center}
}
.saw-fab{position:fixed;bottom:80px;right:16px;z-index:300;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.saw-fab-btn{display:flex;align-items:center;gap:7px;padding:9px 15px;background:#fff;color:#000;border-radius:var(--radius);font-size:.76rem;font-weight:600;transition:var(--tr);border:none;cursor:pointer;white-space:nowrap;position:relative}
.saw-fab-pulse{position:absolute;top:-3px;right:-3px;width:8px;height:8px;border-radius:50%;background:var(--red);animation:fabPulse 2s infinite}
@keyframes fabPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.4)}}
.tg-fab-btn{display:flex;align-items:center;gap:7px;padding:9px 15px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:var(--radius);font-size:.76rem;font-weight:500;transition:var(--tr);cursor:pointer;text-decoration:none}
.saw-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:400;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px)}
.saw-modal-bg.open{display:flex}
.saw-modal{background:var(--bg2);border:1px solid var(--border);border-top-left-radius:var(--radius2);border-top-right-radius:var(--radius2);width:100%;max-width:480px;padding:0 0 32px;overflow:hidden;animation:sawSlideUp .28s cubic-bezier(.4,0,.2,1)}
@keyframes sawSlideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.saw-modal-handle{width:36px;height:3px;background:var(--border);border-radius:2px;margin:12px auto 0}
.saw-modal-hero{padding:22px 20px 18px;border-bottom:1px solid var(--border2);position:relative}
.saw-modal-ttl{font-size:1rem;font-weight:700;color:var(--text);margin-bottom:4px}
.saw-modal-sub{font-size:.78rem;color:var(--text3);line-height:1.5}
.saw-close{position:absolute;top:12px;right:12px;width:26px;height:26px;border-radius:var(--radius);background:var(--bg3);color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:.65rem;cursor:pointer;border:1px solid var(--border)}
.saw-modal-body{padding:18px 20px 0}
.saw-amounts{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:12px}
.saw-amt{padding:9px 4px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);text-align:center;font-size:.75rem;font-weight:500;color:var(--text2);cursor:pointer;transition:var(--tr)}
.saw-amt.on{background:var(--text);border-color:var(--text);color:#000;font-weight:600}
.saw-goto{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:12px;background:var(--text);color:#000;border-radius:var(--radius);font-size:.84rem;font-weight:700;cursor:pointer;transition:var(--tr);border:none;margin-top:2px}
.saw-note{text-align:center;font-size:.65rem;color:var(--text3);margin-top:10px;line-height:1.5}
.pm-hero{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:40px 28px;text-align:center;margin-bottom:24px}
.pm-title{font-size:1.5rem;font-weight:800;color:var(--text);margin-bottom:8px}
.pm-subtitle{font-size:.82rem;color:var(--text3);margin-bottom:20px;line-height:1.6}
.pm-stats{display:flex;justify-content:center;gap:32px;margin-bottom:22px}
.pm-stat-num{font-size:1.3rem;font-weight:800;color:var(--text)}
.pm-stat-lbl{font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-top:1px}
.pm-cta{display:inline-flex;align-items:center;gap:7px;padding:11px 24px;background:var(--text);color:#000;border-radius:var(--radius);font-size:.84rem;font-weight:700;cursor:pointer;border:none}
.pm-perks{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:1px;background:var(--border2);margin-bottom:24px;border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden}
.pm-perk{background:var(--bg);padding:16px;display:flex;align-items:flex-start;gap:12px;position:relative}
.pm-perk:hover{background:var(--bg2)}
.pm-perk-ico{width:36px;height:36px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;background:var(--bg3);color:var(--text2)}
.pm-perk-body h4{font-size:.82rem;font-weight:600;margin-bottom:3px;color:var(--text)}
.pm-perk-body p{font-size:.72rem;color:var(--text3);line-height:1.5}
.pm-perk-badge{position:absolute;top:12px;right:12px;font-size:.55rem;font-weight:700;padding:2px 6px;border-radius:3px;border:1px solid}
.pm-perk-badge.soon{color:var(--text3);border-color:var(--border)}
.pm-perk-badge.live{color:var(--ml);border-color:rgba(16,185,129,.2)}
.pm-tiers{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin-bottom:24px}
.pm-tier{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:20px;text-align:center;position:relative}
.pm-tier.popular{border-color:rgba(255,255,255,.16)}
.pm-tier-badge{position:absolute;top:-9px;left:50%;transform:translateX(-50%);background:var(--text);color:#000;font-size:.55rem;font-weight:700;padding:2px 10px;border-radius:3px;white-space:nowrap}
.pm-tier-name{font-size:.65rem;font-weight:600;color:var(--text3);margin-bottom:5px;text-transform:uppercase}
.pm-tier-price{font-size:1.3rem;font-weight:800;color:var(--text);margin-bottom:3px}
.pm-tier-price span{font-size:.65rem;font-weight:400;color:var(--text3)}
.pm-tier-desc{font-size:.7rem;color:var(--text3);margin-bottom:12px;line-height:1.5}
.pm-tier-btn{display:block;padding:9px;background:var(--text);color:#000;border-radius:var(--radius);font-size:.75rem;font-weight:600;cursor:pointer;border:none;width:100%}
.pm-tier-btn.outline{background:none;border:1px solid var(--border);color:var(--text2)}
.pm-faq{margin-bottom:24px}
.pm-faq-item{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);margin-bottom:4px;overflow:hidden}
.pm-faq-q{padding:13px 14px;font-size:.82rem;font-weight:500;cursor:pointer;display:flex;justify-content:space-between;align-items:center;color:var(--text)}
.pm-faq-q i{transition:transform .25s;color:var(--text3);font-size:.65rem}
.pm-faq-q.open i{transform:rotate(180deg)}
.pm-faq-a{padding:0 14px;max-height:0;overflow:hidden;transition:all .25s;font-size:.78rem;color:var(--text3);line-height:1.65}
.pm-faq-a.open{padding:0 14px 13px;max-height:200px}
.pm-donate-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:22px;text-align:center}
.pm-donate-box h3{font-size:.95rem;font-weight:700;margin-bottom:6px;color:var(--text)}
.pm-donate-box p{font-size:.78rem;color:var(--text3);margin-bottom:14px;line-height:1.6}
.rot-banner{border-radius:var(--radius);margin:0 0 20px;overflow:hidden;position:relative;border:1px solid var(--border)}
.rot-slide{display:none}
.rot-slide.active{display:block;animation:banFade .35s ease}
@keyframes banFade{from{opacity:0}to{opacity:1}}
.rot-banner-inner{padding:13px 16px;display:flex;align-items:center;gap:12px}
.rot-banner-ttl{font-size:.8rem;font-weight:600;margin-bottom:1px}
.rot-banner-sub{font-size:.7rem;opacity:.7;line-height:1.4}
.rot-banner-btn{padding:6px 13px;border-radius:var(--radius);font-size:.7rem;font-weight:600;border:none;cursor:pointer;flex-shrink:0}
.rot-banner-dots{display:flex;gap:3px;position:absolute;bottom:5px;right:8px}
.rot-dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.25)}
.rot-dot.on{background:rgba(255,255,255,.7);width:12px;border-radius:2px}
.rot-banner-close{position:absolute;top:5px;right:5px;width:18px;height:18px;border-radius:3px;background:rgba(0,0,0,.3);color:rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;font-size:.5rem;cursor:pointer;border:none}
.fb-sync-status{display:inline-flex;align-items:center;gap:4px;font-size:.62rem;color:var(--ml);padding:3px 8px;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);border-radius:var(--radius);margin-left:8px}
/* ══ AUTH STYLES (removed) ══ */
@media(max-width:768px){
  .hdr-in{padding:0 12px;height:52px}.nav{display:none}.mbar{display:block}
  .main{padding:14px 12px 80px}
  .grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr))}
  .din{flex-direction:column;padding:16px;align-items:center;text-align:center}
  .dposter{width:130px}.dinfo{align-items:center}.dsts{justify-content:center}
  .swrap{max-width:none;flex:1}
  .plat-btn span.plat-name{display:none}
  .saw-fab{bottom:70px;right:12px}

  .foot-bottom{flex-direction:column;text-align:center}
}
@media(max-width:400px){.grid{grid-template-columns:repeat(2,1fr)}}

/* ══ HERO CAROUSEL ══ */
.hero-carousel{position:relative;width:100%;margin-bottom:24px;border-radius:var(--radius2);overflow:hidden;background:var(--bg2)}
.hero-slides{display:flex;transition:transform .5s cubic-bezier(.4,0,.2,1);will-change:transform}
.hero-slide{min-width:100%;position:relative;overflow:hidden;background:var(--bg3);flex-shrink:0;height:220px}
@media(max-width:768px){.hero-slide{height:200px}}
@media(max-width:400px){.hero-slide{height:180px}}
.hero-slide-img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 8s ease;transform:scale(1.05)}
.hero-slide.active .hero-slide-img{transform:scale(1)}
.hero-slide-grad{position:absolute;inset:0;background:linear-gradient(to right,rgba(0,0,0,.85) 0%,rgba(0,0,0,.5) 50%,rgba(0,0,0,.1) 100%)}
.hero-slide-grad2{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.7) 0%,transparent 60%)}
.hero-slide-grad{position:absolute;inset:0;background:linear-gradient(to right,rgba(0,0,0,.92) 0%,rgba(0,0,0,.6) 55%,rgba(0,0,0,.15) 100%)}
.hero-slide-grad2{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.85) 0%,rgba(0,0,0,.1) 50%,transparent 100%)}
.hero-slide-content{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:24px 20px 20px;z-index:2;box-sizing:border-box}
.hero-slide-plat{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);backdrop-filter:blur(8px);border-radius:4px;padding:3px 10px;font-size:.62rem;font-weight:600;color:rgba(255,255,255,.95);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;width:fit-content;max-width:100%}
.hero-slide-plat img{width:14px;height:14px;border-radius:2px;object-fit:cover;flex-shrink:0}
.hero-slide-title{font-size:1.25rem;font-weight:800;color:#fff;line-height:1.25;margin-bottom:8px;text-shadow:0 2px 16px rgba(0,0,0,.9);width:100%;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.hero-slide-meta{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.hero-slide-tag{font-size:.65rem;color:rgba(255,255,255,.8);background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:3px;padding:2px 7px}
.hero-slide-score{font-size:.65rem;color:var(--gold);display:flex;align-items:center;gap:3px;font-weight:600}
.hero-slide-eps{font-size:.65rem;color:rgba(255,255,255,.65);display:flex;align-items:center;gap:4px}
.hero-slide-actions{display:flex;gap:8px;align-items:center;flex-wrap:nowrap}
.hero-btn-play{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;background:#fff;color:#000;border-radius:var(--radius);font-size:.8rem;font-weight:700;border:none;cursor:pointer;transition:var(--tr);white-space:nowrap;flex-shrink:0}
.hero-btn-play:hover{background:rgba(255,255,255,.9);transform:scale(1.03)}
.hero-btn-play i{font-size:.75rem}
.hero-btn-info{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;background:rgba(255,255,255,.15);color:#fff;border-radius:var(--radius);font-size:.78rem;font-weight:600;border:1px solid rgba(255,255,255,.3);cursor:pointer;transition:var(--tr);backdrop-filter:blur(6px);white-space:nowrap;flex-shrink:0}
.hero-btn-info:hover{background:rgba(255,255,255,.25)}
.hero-nav-btn{position:absolute;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.15);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.75rem;cursor:pointer;z-index:5;transition:var(--tr);backdrop-filter:blur(6px)}
.hero-nav-btn:hover{background:rgba(0,0,0,.75)}
.hero-nav-btn.prev{left:12px}
.hero-nav-btn.next{right:12px}
@media(max-width:768px){.hero-nav-btn{display:none}}
.hero-dots{position:absolute;bottom:14px;right:16px;display:flex;gap:5px;z-index:5}
.hero-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.3);cursor:pointer;transition:all .25s}
.hero-dot.on{background:#fff;width:16px;border-radius:3px}
.hero-skeleton{height:220px;background:var(--bg2);animation:skel-shimmer 1.4s infinite;background-size:200% 100%;background-image:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);border-radius:var(--radius2);margin-bottom:24px}
@media(max-width:768px){.hero-skeleton{height:200px}}
@media(max-width:400px){.hero-skeleton{height:180px}}

/* ══ RESUME BANNER ══ */
.resume-banner{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:10px 12px;margin-bottom:18px;cursor:pointer;transition:background .15s,border-color .15s;position:relative;overflow:hidden}
.resume-banner:hover{background:var(--bg3);border-color:rgba(255,255,255,.12)}
.resume-banner::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(230,57,70,.06) 0%,transparent 60%);pointer-events:none}
.resume-thumb{width:46px;height:62px;border-radius:7px;overflow:hidden;flex-shrink:0;background:var(--bg3);position:relative}
.resume-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.resume-thumb-overlay{position:absolute;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center}
.resume-thumb-overlay i{font-size:.7rem;color:#fff}
.resume-info{flex:1;min-width:0}
.resume-label{font-size:.58rem;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px;display:flex;align-items:center;gap:4px}
.resume-label::before{content:'';display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--red);animation:resumePulse 2s infinite}
@keyframes resumePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}
.resume-name{font-size:.85rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;line-height:1.3}
.resume-meta{font-size:.68rem;color:var(--text3);display:flex;align-items:center;gap:6px}
.resume-prog-wrap{height:2px;background:var(--bg5);border-radius:1px;margin-top:5px;overflow:hidden}
.resume-prog-fill{height:100%;background:linear-gradient(90deg,var(--red),#ff6b6b);border-radius:1px;transition:width .3s}
.resume-play-btn{width:32px;height:32px;border-radius:50%;background:var(--text);color:#000;display:flex;align-items:center;justify-content:center;font-size:.7rem;flex-shrink:0;transition:transform .15s}
.resume-banner:hover .resume-play-btn{transform:scale(1.1)}
.resume-dismiss{position:absolute;top:6px;right:6px;width:18px;height:18px;border-radius:3px;background:transparent;color:var(--text3);display:flex;align-items:center;justify-content:center;font-size:.5rem;cursor:pointer;border:none;opacity:0;transition:opacity .15s}
.resume-banner:hover .resume-dismiss{opacity:1}

/* ══ GENRE FILTER CHIPS ══ */
.genre-bar{display:flex;gap:6px;overflow-x:auto;padding:0 0 10px;margin-bottom:4px;scrollbar-width:none}
.genre-bar::-webkit-scrollbar{display:none}
.genre-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:.72rem;font-weight:500;color:var(--text3);background:var(--bg3);border:1px solid var(--border);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.genre-chip:hover{border-color:rgba(255,255,255,.16);color:var(--text)}
.genre-chip.on{background:var(--text);color:#000;border-color:var(--text);font-weight:600}
.genre-chip i{font-size:.62rem}

/* ══ IMAGE BLUR-UP ══ */
.cimg img{filter:none;transition:filter .3s ease,opacity .3s ease,transform .4s ease}
.cimg img.img-loading{opacity:0;filter:blur(4px)}
.cimg img.img-loaded,.cimg img.loaded{opacity:1;filter:none}

/* ══ PULL TO REFRESH ══ */
.ptr-wrap{position:fixed;top:56px;left:0;right:0;z-index:99;display:flex;justify-content:center;pointer-events:none}
.ptr-box{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:7px 16px;font-size:.75rem;color:var(--text2);transform:translateY(-60px);transition:transform .25s ease,opacity .25s ease;opacity:0;box-shadow:var(--shadow)}
.ptr-box.pulling{transform:translateY(8px);opacity:1}
.ptr-box.refreshing{transform:translateY(8px);opacity:1}
.ptr-spin{width:14px;height:14px;border:2px solid var(--bg5);border-top-color:var(--text2);border-radius:50%}
.ptr-box.refreshing .ptr-spin{animation:spin .6s linear infinite}

/* ══ ADAPTIVE UI COLOR ══ */
:root{
  --aui-r:230;--aui-g:57;--aui-b:70;
  --aui-primary:rgb(var(--aui-r),var(--aui-g),var(--aui-b));
  --aui-glow:rgba(var(--aui-r),var(--aui-g),var(--aui-b),.18);
  --aui-soft:rgba(var(--aui-r),var(--aui-g),var(--aui-b),.08);
  --aui-border:rgba(var(--aui-r),var(--aui-g),var(--aui-b),.25);
  --aui-text:rgb(var(--aui-r),var(--aui-g),var(--aui-b));
}
/* Transition semua elemen yang kena warna adaptif */
:root{transition:--aui-r .6s,--aui-g .6s,--aui-b .6s}
.hdr{transition:background .7s ease,border-color .7s ease,box-shadow .7s ease}
.hdr.aui-active{
  background:rgba(0,0,0,.92)!important;
  border-bottom-color:var(--aui-border)!important;
  box-shadow:0 0 40px var(--aui-glow)!important;
}
/* Detail page adaptive background */
.dhero{position:relative;transition:background .7s ease}
.aui-detail-bg{
  position:fixed;inset:0;z-index:-1;
  opacity:0;transition:opacity .8s ease;
  pointer-events:none;
}
.aui-detail-bg.show{opacity:1}
.aui-detail-bg-inner{
  position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 0%,
    rgba(var(--aui-r),var(--aui-g),var(--aui-b),.22) 0%,
    rgba(var(--aui-r),var(--aui-g),var(--aui-b),.06) 45%,
    transparent 70%
  );
}
.aui-detail-bg-noise{
  position:absolute;inset:0;
  background:var(--bg);
  opacity:.85;
}
/* Accent elements ikut warna */
.bwatch{transition:background .5s ease,box-shadow .5s ease,color .5s ease}
.bwatch.aui-colored{
  background:var(--aui-primary)!important;
  box-shadow:0 4px 20px var(--aui-glow)!important;
  color:#fff!important;
}
/* Tags adaptive */
.dtag{transition:background .5s ease,border-color .5s ease,color .5s ease}
.aui-active .dtag{
  background:var(--aui-soft)!important;
  border-color:var(--aui-border)!important;
  color:var(--aui-text)!important;
}
/* Stats glass adaptive */
.ds-glass{transition:background .5s ease,border-color .5s ease}
.aui-active .ds-glass{
  background:var(--aui-soft)!important;
  border-color:var(--aui-border)!important;
}
.aui-active .ds-glass.score{
  background:rgba(var(--aui-r),var(--aui-g),var(--aui-b),.1)!important;
  border-color:var(--aui-border)!important;
  color:var(--aui-text)!important;
}
/* Episode buttons adaptive */
.epc{transition:background .4s ease,border-color .4s ease,color .4s ease,box-shadow .4s ease}
.aui-active .epc:hover,.aui-active .epc.cw-ep-active{
  background:var(--aui-primary)!important;
  border-color:var(--aui-primary)!important;
  color:#fff!important;
  box-shadow:0 2px 12px var(--aui-glow)!important;
}
/* Banner poster glow */
.d-banner-poster{transition:box-shadow .7s ease}
.aui-active .d-banner-poster{
  box-shadow:0 8px 40px var(--aui-glow),0 0 0 1px var(--aui-border)!important;
}
/* D-banner gradient adaptive */
.d-banner-grad{transition:background .7s ease}
/* Scrollbar adaptive */
::-webkit-scrollbar-thumb{transition:background .5s ease}
.aui-active-page ::-webkit-scrollbar-thumb{background:var(--aui-primary)!important;opacity:.5}
/* Section title adaptive */
.d-section-title{transition:color .5s ease}
.aui-active .d-section-title{color:rgba(var(--aui-r),var(--aui-g),var(--aui-b),.7)!important}
/* Back button adaptive */
.back{transition:color .5s ease,border-color .5s ease}
.aui-active-page .back{
  border-color:var(--aui-border)!important;
  color:var(--aui-text)!important;
}
/* Divider adaptive */
.d-divider{transition:background .5s ease}
.aui-active .d-divider{background:var(--aui-border)!important}
/* Fav bookmark button adaptive */
.bfav.saved{transition:background .5s,border-color .5s,color .5s}
.aui-active .bfav.saved{
  background:var(--aui-soft)!important;
  border-color:var(--aui-border)!important;
  color:var(--aui-text)!important;
}
/* Platform badge in detail */
.d-plat-name{transition:color .5s ease}
.aui-active .d-plat-name{color:var(--aui-text)!important;opacity:.85}
/* Color palette preview chip */
.aui-palette{
  display:flex;gap:4px;align-items:center;
  position:fixed;bottom:80px;right:14px;
  z-index:50;opacity:0;
  transition:opacity .4s ease;
  pointer-events:none;
}
.aui-palette.show{opacity:1}
.aui-chip{
  width:10px;height:10px;border-radius:50%;
  box-shadow:0 1px 4px rgba(0,0,0,.5);
}

/* ══ PARALLAX & DEPTH EFFECTS ══ */
/* Card 3D tilt on hover */
.card{transform-style:preserve-3d;will-change:transform}
.card .cimg img{will-change:transform}

/* Hero parallax image */
.hero-slide{overflow:hidden}
.hero-slide-img{will-change:transform;transform-origin:center center}

/* Floating depth badge */
.cscore,.cbadge,.cplatbadge{will-change:transform;transition:transform .2s ease,opacity .2s ease}

/* Card glow per platform */
.card.plx-hover{box-shadow:0 20px 60px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.08)!important}

/* Parallax scroll reveal */
@keyframes plxReveal{from{opacity:0;transform:translateY(30px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.plx-reveal{animation:plxReveal .5s cubic-bezier(.22,1,.36,1) forwards}

/* Depth layers on card hover */
.card .cimg{transition:transform .35s cubic-bezier(.22,1,.36,1)}
.card .cbody{transition:transform .35s cubic-bezier(.22,1,.36,1),opacity .2s}
.card .card-fav-btn{transition:transform .35s cubic-bezier(.22,1,.36,1),opacity .2s,background .2s}

/* Hero content parallax */
.hero-slide-content{will-change:transform;transition:transform .1s linear}

/* Tilt shine overlay */
.card-shine{position:absolute;inset:0;border-radius:10px;pointer-events:none;z-index:9;opacity:0;transition:opacity .3s;background:radial-gradient(circle at 50% 50%,rgba(255,255,255,.12) 0%,transparent 65%)}

/* Depth glow ring */
.card::after{content:'';position:absolute;inset:-1px;border-radius:11px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:0;background:linear-gradient(135deg,rgba(255,255,255,.1),rgba(255,255,255,.02))}
.card.plx-hover::after{opacity:1}

/* Scroll-based section fade-in */
.plx-section{opacity:0;transform:translateY(24px);transition:opacity .6s cubic-bezier(.22,1,.36,1),transform .6s cubic-bezier(.22,1,.36,1)}
.plx-section.plx-in{opacity:1;transform:translateY(0)}

/* Mouse parallax floating elements */
.hdr-in .logo{transition:transform .15s ease;display:flex;align-items:center;gap:7px}
.logo i{transition:transform .2s ease,text-shadow .2s ease}

/* Platform badge depth */
.cplatbadge{transform:translateZ(8px)}
.cscore{transform:translateZ(12px)}

/* ══ HOME SECTION SEPARATOR ══ */
.home-section-sep{height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.07),transparent);margin:18px 0 22px}
.home-section-sep-sm{height:8px}

/* ══ CARD BADGES — watched / new / top ══ */
.card-watched-bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(255,255,255,.1);z-index:5}
.card-watched-fill{height:100%;background:linear-gradient(90deg,var(--red),#ff6b6b);border-radius:0 2px 2px 0;transition:width .3s}
.card-new-badge{position:absolute;top:7px;left:7px;font-size:.48rem;font-weight:800;padding:2px 7px;border-radius:3px;background:var(--ml);color:#fff;letter-spacing:.06em;text-transform:uppercase;z-index:6;box-shadow:0 2px 8px rgba(16,185,129,.4)}
.card-top-badge{position:absolute;top:7px;left:7px;font-size:.55rem;font-weight:900;padding:2px 7px;border-radius:3px;background:linear-gradient(135deg,#c9a84c,#f0d070);color:#000;letter-spacing:.03em;z-index:6;box-shadow:0 2px 8px rgba(201,168,76,.4)}

/* ══ DETAIL — STAR RATING ══ */
.d-star-rating{display:inline-flex;gap:2px;color:#f59e0b;font-size:.7rem}
.d-star-rating .far{color:rgba(245,158,11,.3)}

/* ══ DETAIL — RELATED DRAMAS ══ */
.d-related-section{padding:0 0 24px}
.d-related-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.d-related-scroll::-webkit-scrollbar{display:none}
.d-related-card{flex-shrink:0;width:100px;cursor:pointer;transition:transform .2s cubic-bezier(.34,1.56,.64,1)}
.d-related-card:hover{transform:translateY(-4px) scale(1.03)}
.d-related-card:active{transform:scale(.95)}
.d-related-img{aspect-ratio:2/3;border-radius:8px;overflow:hidden;background:var(--bg3);margin-bottom:5px}
.d-related-img img{width:100%;height:100%;object-fit:cover;display:block}
.d-related-name{font-size:.65rem;color:var(--text2);line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.d-related-score{font-size:.58rem;color:#f59e0b;margin-top:2px;display:flex;align-items:center;gap:3px}

/* ══ SEARCH — ANIMATED PLACEHOLDER & CHIPS ══ */
.search-pop-chips{position:fixed;top:52px;left:0;right:0;z-index:302;background:rgba(0,0,0,.97);border-bottom:1px solid var(--border);padding:10px 14px 14px;animation:srchChipsIn .2s ease}
@keyframes srchChipsIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.search-pop-label{font-size:.62rem;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em}
.search-pop-row{display:flex;flex-wrap:wrap;gap:6px}
.search-pop-chip{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;font-size:.72rem;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s}
.search-pop-chip:hover,.search-pop-chip:active{background:var(--text);border-color:var(--text);color:#000}

</head>

var ApiCache={
  _ttl:5*60*1000,
  _k:function(key){return'dfc_'+key},
  get:function(key){
    try{
      var raw=sessionStorage.getItem(this._k(key));
      if(!raw)return null;
      var obj=JSON.parse(raw);
      if(Date.now()-obj.ts>this._ttl)return null;
      return obj.data;
    }catch(e){return null}
  },
  set:function(key,data){
    try{sessionStorage.setItem(this._k(key),JSON.stringify({ts:Date.now(),data:data}))}catch(e){}
  },
  clear:function(prefix){
    try{
      var keys=[];
      for(var i=0;i<sessionStorage.length;i++){var k=sessionStorage.key(i);if(k&&k.indexOf('dfc_'+(prefix||''))===0)keys.push(k)}
      keys.forEach(function(k){sessionStorage.removeItem(k)});
    }catch(e){}
  },
  clearAll:function(){
    try{
      var keys=[];
      for(var i=0;i<sessionStorage.length;i++){var k=sessionStorage.key(i);if(k&&k.indexOf('dfc_')===0)keys.push(k)}
      keys.forEach(function(k){sessionStorage.removeItem(k)});
    }catch(e){}
  }
};

// ══ PULL TO REFRESH ══
var PTR={
  _startY:0,_isDragging:false,_threshold:80,_isRefreshing:false,
  init:function(){
    var self=this;
    document.addEventListener('touchstart',function(e){
      if(window.scrollY>10)return;
      self._startY=e.touches[0].clientY;
      self._isDragging=true;
    },{passive:true});
    document.addEventListener('touchmove',function(e){
      if(!self._isDragging||self._isRefreshing)return;
      var dy=e.touches[0].clientY-self._startY;
      if(dy<0){self._isDragging=false;return}
      var box=document.getElementById('ptrBox');
      var txt=document.getElementById('ptrTxt');
      if(!box)return;
      if(dy>20){
        box.classList.add('pulling');
        if(dy>=self._threshold){txt.textContent='↑ Lepas untuk refresh';}
        else{txt.textContent='↓ Tarik untuk refresh';}
      }
    },{passive:true});
    document.addEventListener('touchend',function(e){
      if(!self._isDragging||self._isRefreshing)return;
      self._isDragging=false;
      var dy=e.changedTouches[0].clientY-self._startY;
      var box=document.getElementById('ptrBox');
      var txt=document.getElementById('ptrTxt');
      if(dy>=self._threshold){
        self._isRefreshing=true;
        if(box){box.classList.add('refreshing');if(txt)txt.textContent='Memuat ulang...';}
        // Clear cache platform aktif lalu reload tab
        ApiCache.clear(App.src+'_'+App.tab);
        setTimeout(function(){
          App.switchTab(App.tab);
          setTimeout(function(){
            self._isRefreshing=false;
            if(box){box.classList.remove('pulling','refreshing');if(txt)txt.textContent='↓ Tarik untuk refresh';}
            showToast('✅ Konten diperbarui');
          },800);
        },300);
      }else{
        if(box)box.classList.remove('pulling');
      }
    },{passive:true});
  }
};



function showToast(m,type){
  var t=document.getElementById('toast');
  var ico=document.getElementById('toastIco');
  var msg=document.getElementById('toastMsg');
  if(!t)return;
  t.className='toast';
  var icon='',cls='';
  if(type==='ok'||(!type&&(m.indexOf('Ditambah')>-1||m.indexOf('disalin')>-1||m.indexOf('Tersimpan')>-1||m.indexOf('kembali')>-1||m.indexOf('disinkron')>-1))){icon='✅';cls='t-ok'}
  else if(type==='err'||(!type&&(m.indexOf('Gagal')>-1||m.indexOf('Error')>-1||m.indexOf('tidak ada')>-1))){icon='❌';cls='t-err'}
  else if(type==='warn'||(!type&&(m.indexOf('terakhir')>-1||m.indexOf('pertama')>-1))){icon='⚠️';cls='t-warn'}
  else{icon='ℹ️';cls=''}
  if(ico)ico.textContent=icon;
  if(msg)msg.textContent=m;
  if(cls)t.classList.add(cls);
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer=setTimeout(function(){t.classList.remove('show')},2500);
}

function toList(res){
  if(!res)return[];if(Array.isArray(res))return res;
  if(res.episode_list&&Array.isArray(res.episode_list))return res.episode_list;
  if(res.episodes&&Array.isArray(res.episodes))return res.episodes;
  if(res.records&&Array.isArray(res.records)&&res.records.length>0)return res.records;
  // DramaBox sonzaix: {data:{results:[...]}} — field utama
  if(res.data&&res.data.results&&Array.isArray(res.data.results)&&res.data.results.length>0)return res.data.results;
  if(res.results&&Array.isArray(res.results)&&res.results.length>0)return res.results;
  // Sonzai API: {data:[{books:[...]}, ...]} atau {data:{books:[...]}}
  if(res.data&&Array.isArray(res.data)&&res.data.length>0&&res.data[0]&&res.data[0].books){
    var combined=[];res.data.forEach(function(s){if(s.books&&Array.isArray(s.books))combined=combined.concat(s.books)});if(combined.length)return combined;
  }
  if(res.data&&res.data.books&&Array.isArray(res.data.books))return res.data.books;
  if(res.data&&res.data.dramas&&Array.isArray(res.data.dramas))return res.data.dramas;
  if(res.data&&res.data.list&&Array.isArray(res.data.list))return res.data.list;
  if(res.data&&Array.isArray(res.data))return res.data;
  if(res.data&&Array.isArray(res.data)&&false){// deduplicated
    var first=res.data[0];
    if(first&&typeof first==='object'&&!Array.isArray(first)){
      var nk=['books','items','dramas','list','videos','series'];
      for(var ki=0;ki<nk.length;ki++){var key=nk[ki];if(first[key]&&Array.isArray(first[key])&&first[key].length>0){var combined=[];res.data.forEach(function(item){if(item&&item[key]&&Array.isArray(item[key]))combined=combined.concat(item[key])});if(combined.length>0)return combined}}
      if(first.id||first.dramaId||first.bookId||first.drama_id||first.key||first.slug||first.seriesId)return res.data;
    }
    if(Array.isArray(first))return first;return res.data;
  }
  if(res.items&&Array.isArray(res.items)){if(res.items.length&&typeof res.items[0]==='object'&&res.items[0].items){var out=[];res.items.forEach(function(m){if(m&&Array.isArray(m.items))out=out.concat(m.items)});return out}return res.items}
  if(res.result&&Array.isArray(res.result))return res.result;
  if(res.books&&Array.isArray(res.books))return res.books;
  if(res.list&&Array.isArray(res.list))return res.list;
  if(res.series&&Array.isArray(res.series))return res.series;
  if(res.dramas&&Array.isArray(res.dramas))return res.dramas;
  if(res.content&&Array.isArray(res.content))return res.content;
  var found=[];
  (function walk(x,depth){
    if(!x||depth>5)return;if(Array.isArray(x)){x.forEach(function(i){walk(i,depth+1)});return}
    if(typeof x!=='object')return;
    var hasId=x.key||x.id||x.bookId||x.slug||x.dramaId||x.drama_id||x.seriesId||x.series_id;
    var hasTitle=x.title||x.name||x.bookName||x.dramaName||x.drama_name||x.seriesName;
    if(hasId&&hasTitle){found.push(x);return}
    Object.keys(x).forEach(function(k){if('page_info author contact message type status'.indexOf(k)>-1)return;walk(x[k],depth+1)});
  })(res,0);
  return found;
}

function rsToList(res){
  if(!res)return[];
  var d=res.data||res;
  // /foryou & /feed returns data.lists = array of sections, each with book_list
  if(d&&Array.isArray(d.lists)&&d.lists.length){
    // Cek apakah lists[] adalah array of books langsung (search result)
    // atau array of sections yang punya .books (foryou/feed result)
    var first=d.lists[0];
    if(first&&(first.book_id||first.id||first.book_title||first.title)){
      // lists[] adalah array of books langsung
      return d.lists;
    }
    // lists[] adalah array of sections dengan .books di dalamnya
    var combined=[];var seen={};
    d.lists.forEach(function(section){
      var bl=section.books||section.book_list||section.list||section.items||[];
      if(Array.isArray(bl))bl.forEach(function(b){var uid=String(b.book_id||b.id||b._id||b.bookId||'');if(uid&&!seen[uid]){seen[uid]=true;combined.push(b)}});
    });
    if(combined.length){return combined;}
  }
  if(d&&Array.isArray(d.book_list)&&d.book_list.length){return d.book_list;}
  if(d&&Array.isArray(d.list)&&d.list.length){return d.list;}
  if(d&&Array.isArray(d.books)&&d.books.length){return d.books;}
  if(d&&Array.isArray(d.items)&&d.items.length){return d.items;}
  if(d&&Array.isArray(d.series)&&d.series.length)return d.series;
  if(d&&Array.isArray(d.dramas)&&d.dramas.length)return d.dramas;
  if(d&&Array.isArray(d.content)&&d.content.length)return d.content;
  if(d&&Array.isArray(d.result)&&d.result.length)return d.result;
  if(Array.isArray(d)&&d.length)return d;
  if(Array.isArray(res)&&res.length)return res;
  // Scan all keys for arrays of objects with id+title
  var src=d&&typeof d==='object'?d:res;
  var keys=Object.keys(src||{});
  for(var ki=0;ki<keys.length;ki++){
    var val=src[keys[ki]];
    if(Array.isArray(val)&&val.length&&val[0]&&typeof val[0]==='object'){
      var s=val[0];
      if((s.id||s._id||s.bookId)&&(s.title||s.name||s.bookName)){
        
        return val;
      }
    }
  }
  return toList(res);
}

function hasMore(r,l,src){
  if(!l||l.length===0)return false;
  var d=r.data||r;

  // ── DramaBox (sonzaix) ── has_more boolean atau data.total/data.page
  if(src==='dramabox'){
    if(r.has_more!==undefined)return!!r.has_more;
    if(r.data&&r.data.has_more!==undefined)return!!r.data.has_more;
    // {data:{page:N, total:X, results:[...]}} — ada lebih kalau total > page*20
    var dd=r.data||r;
    if(dd&&dd.total!==undefined&&dd.page!==undefined)return(Number(dd.page)*20)<Number(dd.total);
    return l.length>=10;
  }

  // ── GoodShort ── data.current < data.pages
  if(src==='goodshort'){
    if(d&&d.current!==undefined&&d.pages!==undefined)return Number(d.current)<Number(d.pages);
    if(d&&d.data&&d.data.current!==undefined&&d.data.pages!==undefined)return Number(d.data.current)<Number(d.data.pages);
    return l.length>0;
  }

  // ── FreeReels ── baca has_more dari response
  if(src==='freereels'){if(r.has_more!==undefined)return!!r.has_more;if(r.data&&r.data.has_more!==undefined)return!!r.data.has_more;return l.length>=5;}

  _activeGenre:null,
  _genreBar:function(){

    var genreCount={};

      if(!d.tag)return;
      String(d.tag).split(/[,|]/).forEach(function(t){

        if(t&&t.length>1&&t.length<25){genreCount[t]=(genreCount[t]||0)+1;}
      });
    });
    var genres=Object.keys(genreCount).sort(function(a,b){return genreCount[b]-genreCount[a]}).slice(0,10);
    if(!genres.length)return'';

      // Listen disabled sources
      db.collection('admin').doc('config').onSnapshot(function(doc){

        if(data.disabledSources){

        }
        // Broadcast message
        if(data.broadcast&&data.broadcast.active&&data.broadcast.message){

        // Banner override
        if(data.banner&&data.banner.active){

<!-- ════ UI UPGRADE ENGINE ════ -->
<script>
(function(){
  'use strict';

  /* ── 1. Bottom Nav Pill Indicator ── */
  function initNavPill(){
    var mbar=document.getElementById('navMobile');
    if(!mbar)return;
    // Inject pill element
    var pill=document.createElement('div');
    pill.className='mbar-pill';

    function updatePill(){
      var active=mbar.querySelector('.mb.on');
      if(!active){pill.style.opacity='0';return;}
      var barRect=mbar.getBoundingClientRect();
      var btnRect=active.getBoundingClientRect();
      pill.style.opacity='1';
      pill.style.left=(btnRect.left-barRect.left+4)+'px';
      pill.style.width=(btnRect.width-8)+'px';
      pill.style.top='50%';
      pill.style.transform='translateY(-50%)';
    }

    // Observe changes to nav
    var obs=new MutationObserver(function(){setTimeout(updatePill,20)});
    obs.observe(mbar,{childList:true,subtree:true,attributes:true,attributeFilter:['class']});
    setTimeout(updatePill,300);

    // Update on tab click
    mbar.addEventListener('click',function(){setTimeout(updatePill,30)});

  /* ── 2. Header scroll effect ── */
  function initHeaderScroll(){
    var hdr=document.querySelector('.hdr');
    if(!hdr)return;
    var ticking=false;
    window.addEventListener('scroll',function(){
      if(ticking)return;
      ticking=true;
      requestAnimationFrame(function(){
        hdr.classList.toggle('scrolled',window.scrollY>10);
        ticking=false;
      });
    },{passive:true});
  }

  /* ── 3. Bookmark heart animation ── */
  function initFavAnimation(){
    document.addEventListener('click',function(e){
      var btn=e.target.closest('.card-fav-btn');
      if(!btn)return;
      // Trigger after toggle
      setTimeout(function(){
        if(btn.classList.contains('saved')){
          btn.classList.add('just-saved');
          setTimeout(function(){btn.classList.remove('just-saved')},500);
          // Spawn floating heart
          spawnHeart(btn);

  function spawnHeart(btn){

      'position:fixed',

      'animation:heartFloat .8s cubic-bezier(.22,1,.36,1) forwards',
      'will-change:transform,opacity'
    ].join(';');
    document.body.appendChild(heart);
    setTimeout(function(){heart.remove()},850);

  /* ── 4. Inject heart float keyframe ── */
  function injectKeyframes(){
    var style=document.createElement('style');
    style.textContent=[
      '@keyframes heartFloat{',
      '0%{opacity:1;transform:translateY(0) scale(.8)}',
      '60%{opacity:.9;transform:translateY(-32px) scale(1.2)}',
      '100%{opacity:0;transform:translateY(-52px) scale(.7)}',
      '}'
    ].join('');
    document.head.appendChild(style);
  }

  /* ── 5. Card hover glow per platform ── */
  function initCardPlatformGlow(){
    var GLOW={
      dramabox:'230,57,70',freereels:'124,58,237',
      melolo:'16,185,129',goodshort:'217,119,6',
      dramawave:'8,145,178',shortmax:'225,29,72',
      netshort:'124,58,237',dramabite:'234,88,12',
      flextv:'2,132,199',reelshort:'244,63,94'

      if(!card)return;
      var src=typeof App!=='undefined'?App.src:'dramabox';

      card.style.boxShadow='0 20px 48px rgba(0,0,0,.65),0 0 28px var(--card-glow),0 0 0 1px rgba('+rgb+',.12)';

    document.addEventListener('mouseout',function(e){
      var card=e.target.closest('.card');

  /* ── 6. Smooth image load ── */
  function initImageLoad(){

  /* ── INIT ── */
