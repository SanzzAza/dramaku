name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Copy website to assets
        run: |
          mkdir -p app/src/main/assets
          cp index.html app/src/main/assets/index.html

      - name: Create Gradle Wrapper
        run: gradle wrapper --gradle-version 8.4

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/Dramaku-v2.0.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dramaku-v2.0
          path: app/build/outputs/apk/debug/Dramaku-v2.0.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0-build${{ github.run_number }}
          name: Dramaku v2.0
          files: app/build/outputs/apk/debug/Dramaku-v2.0.apk
          body: |
            **Dramaku v2.0** - Streaming Drama & Film Terbaik
            9 Platform dalam 1 Aplikasi
