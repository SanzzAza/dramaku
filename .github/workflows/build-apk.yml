name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Create Gradle Wrapper
        run: gradle wrapper --gradle-version 8.4

      - name: Build APK (signed release if secrets are valid)
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -e
          mkdir -p app/build/outputs/apk/final

          SIGNING_OK=false
          if [ -n "$ANDROID_KEYSTORE_BASE64" ] && [ -n "$ANDROID_KEYSTORE_PASSWORD" ] && [ -n "$ANDROID_KEY_ALIAS" ]; then
            echo "Signing secrets found. Validating keystore..."
            if echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > app/release.keystore; then
              export ANDROID_KEYSTORE_PATH="$PWD/app/release.keystore"
              if keytool -list                     -keystore "$ANDROID_KEYSTORE_PATH"                     -storepass "$ANDROID_KEYSTORE_PASSWORD"                     -alias "$ANDROID_KEY_ALIAS" >/tmp/keytool-list.log 2>&1 &&                  keytool -certreq                     -keystore "$ANDROID_KEYSTORE_PATH"                     -storepass "$ANDROID_KEYSTORE_PASSWORD"                     -keypass "$ANDROID_KEYSTORE_PASSWORD"                     -alias "$ANDROID_KEY_ALIAS"                     -file /tmp/dramaku-signing-test.csr >/tmp/keytool-certreq.log 2>&1; then
                SIGNING_OK=true
              else
                echo "::warning::Signing secrets are present but invalid. Falling back to debug APK."
                echo "::warning::Most common fix: regenerate using scripts/create-release-keystore.sh, then update ANDROID_KEYSTORE_BASE64 / PASSWORD / ALIAS."
                cat /tmp/keytool-list.log 2>/dev/null || true
                cat /tmp/keytool-certreq.log 2>/dev/null || true
              fi
            else
              echo "::warning::ANDROID_KEYSTORE_BASE64 could not be decoded. Falling back to debug APK."
            fi
          else
            echo "Signing secrets not found. Building debug APK fallback..."
          fi

          if [ "$SIGNING_OK" = "true" ]; then
            echo "Building signed release APK..."
            # Force PKCS12 key password to store password for Gradle signing reliability.
            export ANDROID_KEY_PASSWORD="$ANDROID_KEYSTORE_PASSWORD"
            ./gradlew assembleRelease
            cp app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/final/Dramaku-v3.8-release.apk
            echo "APK_PATH=app/build/outputs/apk/final/Dramaku-v3.8-release.apk" >> "$GITHUB_ENV"
            echo "APK_NAME=Dramaku-v3.8-release" >> "$GITHUB_ENV"
            echo "APK_KIND=signed release" >> "$GITHUB_ENV"
          else
            echo "Building debug APK fallback..."
            ./gradlew assembleDebug
            cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/final/Dramaku-v3.8-debug.apk
            echo "APK_PATH=app/build/outputs/apk/final/Dramaku-v3.8-debug.apk" >> "$GITHUB_ENV"
            echo "APK_NAME=Dramaku-v3.8-debug" >> "$GITHUB_ENV"
            echo "APK_KIND=debug fallback" >> "$GITHUB_ENV"
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_PATH }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v3.8-build${{ github.run_number }}
          name: Dramaku v3.8
          files: ${{ env.APK_PATH }}
          body: |
            **Dramaku v3.8** - Streaming Drama & Film Terbaik
            Build type: ${{ env.APK_KIND }}

            Untuk signed release APK, set GitHub Secrets:
            - ANDROID_KEYSTORE_BASE64
            - ANDROID_KEYSTORE_PASSWORD
            - ANDROID_KEY_ALIAS
            - ANDROID_KEY_PASSWORD
