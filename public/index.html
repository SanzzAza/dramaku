<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 Shenira API</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen py-12">
    <div class="max-w-4xl mx-auto px-6">
        <div class="text-center mb-16">
            <div class="inline-flex items-center gap-3 bg-white/80 px-8 py-4 rounded-3xl shadow-xl backdrop-blur-sm">
                <span class="text-4xl">🤖</span>
                <div>
                    <h1 class="text-4xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">
                        Shenira API
                    </h1>
                    <p class="text-lg text-gray-600 mt-1">AI Tools • Free • Fast • Vercel</p>
                </div>
            </div>
        </div>

        <!-- TTS -->
        <div class="bg-white/90 backdrop-blur-xl rounded-3xl p-10 mb-10 shadow-2xl border border-white/50">
            <h2 class="text-3xl font-bold text-gray-800 mb-8 flex items-center gap-4">
                🔊 Text to Speech
            </h2>
            <textarea id="ttsText" rows="4" 
                class="w-full p-6 text-xl border-2 border-gray-200 rounded-2xl focus:border-blue-500 focus:outline-none resize-vertical mb-6"
                placeholder="Tulis apa saja... Contoh: 'Halo dunia, ini tes AI speech!'">Halo! Shenira API sudah live di Vercel! 🎉</textarea>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                <select id="ttsLang" class="p-4 border-2 border-gray-200 rounded-xl focus:border-blue-500">
                    <option value="id-ID">🇮🇩 Indonesia</option>
                    <option value="en-US">🇺🇸 English</option>
                    <option value="es-ES">🇪🇸 Español</option>
                </select>
                <input type="range" id="ttsSpeed" min="0.5" max="2" step="0.1" value="1" class="col-span-1 md:col-span-2">
                <span id="speedValue" class="text-xl font-bold text-center self-center">1.0x</span>
            </div>
            
            <button onclick="textToSpeech()" 
                class="w-full bg-gradient-to-r from-blue-500 to-indigo-600 text-white py-8 rounded-2xl text-2xl font-bold shadow-2xl hover:from-blue-600 hover:to-indigo-700 transform hover:scale-[1.02] transition-all duration-200">
                🎙️ Buat Audio MP3
            </button>
            
            <audio id="ttsAudio" controls class="w-full mt-8 p-4 bg-gray-50 rounded-2xl hidden"></audio>
            <div id="ttsResult"></div>
        </div>

        <!-- OCR -->
        <div class="bg-white/90 backdrop-blur-xl rounded-3xl p-10 shadow-2xl border border-white/50">
            <h2 class="text-3xl font-bold text-gray-800 mb-8 flex items-center gap-4">
                🖼️ Image to Text
            </h2>
            <input type="file" id="ocrFile" accept="image/*" 
                class="w-full p-6 border-2 border-gray-200 rounded-2xl mb-8 file:mr-6 file:py-6 file:px-10 file:rounded-xl file:border-0 file:bg-emerald-500 file:text-white hover:file:bg-emerald-600 text-xl">
            
            <button onclick="imageToText()" 
                class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 text-white py-8 rounded-2xl text-2xl font-bold shadow-2xl hover:from-emerald-600 hover:to-teal-700 transform hover:scale-[1.02] transition-all duration-200">
                ✨ Ekstrak Teks
            </button>
            <div id="ocrResult"></div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/v1';
        
        document.getElementById('ttsSpeed').addEventListener('input', (e) => {
            document.getElementById('speedValue').textContent = e.target.value + 'x';
        });

        function showResult(id, html, type = 'success') {
            const div = document.getElementById(id);
            const bg = type === 'success' ? 'bg-emerald-100 border-emerald-400' : 
                      type === 'loading' ? 'bg-yellow-100 border-yellow-400' : 'bg-red-100 border-red-400';
            div.innerHTML = `<div class="mt-8 p-8 rounded-2xl border-4 ${bg} text-xl">${html}</div>`;
        }

        async function textToSpeech() {
            const text = document.getElementById('ttsText').value;
            const lang = document.getElementById('ttsLang').value;
            const speed = document.getElementById('ttsSpeed').value;

            if (!text.trim()) return alert('Tulis teks dulu! 😅');

            showResult('ttsResult', '⏳ Membuat audio... (2-5 detik)', 'loading');
            document.getElementById('ttsAudio').classList.add('hidden');

            try {
                const response = await fetch(`${API_BASE}/text-to-speech`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, lang, speed })
                });

                const data = await response.json();
                
                if (data.success) {
                    const audio = document.getElementById('ttsAudio');
                    audio.src = data.url + '?t=' + Date.now();
                    audio.classList.remove('hidden');
                    showResult('ttsResult', `
                        ✅ <strong>Audio Siap!</strong><br>
                        <a href="${data.url}" class="block mt-4 p-4 bg-blue-500 text-white rounded-xl text-center font-bold hover:bg-blue-600" target="_blank">
                            📥 Download MP3
                        </a>
                    `);
                    audio.play();
                } else {
                    throw new Error(data.error || 'Unknown error');
                }
            } catch (error) {
                showResult('ttsResult', `❌ ${error.message}`, 'error');
            }
        }

        async function imageToText() {
            const file = document.getElementById('ocrFile').files[0];
            if (!file) return alert('Pilih gambar dulu! 📸');

            const reader = new FileReader();
            reader.onload = async (e) => {
                showResult('ocrResult', '⏳ Menganalisa gambar... (5-10 detik)', 'loading');

                try {
                    const response = await fetch(`${API_BASE}/image-to-text`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image: e.target.result })
                    });

                    const data = await response.json();
                    
                    if (data.success) {
                        showResult('ocrResult', `
                            ✅ <strong>Teks Ditemukan!</strong><br>
                            <div class="mt-6 p-6 bg-gradient-to-r from-gray-50 to-gray-100 rounded-2xl font-mono text-lg border">
                                ${data.text || 'Tidak ada teks'}
                            </div>
                            <div class="mt-4 text-sm text-gray-600">
                                📊 Confidence: ${data.confidence}% | Words: ${data.words}
                            </div>
                        `);
                    } else {
                        throw new Error(data.error);
                    }
                } catch (error) {
                    showResult('ocrResult', `❌ ${error.message}`, 'error');
                }
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
