<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 Shenira API - Vercel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .glass { backdrop-filter: blur(10px); background: rgba(255,255,255,0.25); }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-50 to-purple-50 py-8">
    <div class="max-w-4xl mx-auto px-4">
        <!-- Header -->
        <div class="text-center mb-12">
            <h1 class="text-5xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent mb-4">
                🤖 Shenira API
            </h1>
            <p class="text-xl text-gray-600">AI Tools Gratis • Text → Speech • Image → Text</p>
        </div>

        <!-- TTS Card -->
        <div class="bg-white/80 backdrop-blur-xl rounded-3xl p-8 mb-8 shadow-2xl border border-white/50">
            <h3 class="text-2xl font-bold text-gray-800 mb-6 flex items-center gap-3">
                🔊 Text to Speech
            </h3>
            <textarea id="ttsText" rows="4" 
                class="w-full p-6 border-2 border-gray-200 rounded-2xl focus:border-indigo-500 focus:outline-none text-lg resize-vertical"
                placeholder="Ketik apa saja..."></textarea>
            <div class="flex gap-4 mb-6">
                <select id="ttsLang" class="flex-1 p-4 border-2 border-gray-200 rounded-2xl focus:border-indigo-500">
                    <option value="id">🇮🇩 Indonesia</option>
                    <option value="en">🇺🇸 English</option>
                    <option value="es">🇪🇸 Español</option>
                </select>
                <input type="range" id="ttsSpeed" min="0.5" max="2" step="0.1" value="1" class="w-32">
                <span id="speedValue">1.0x</span>
            </div>
            <button onclick="textToSpeech()" 
                class="w-full bg-gradient-to-r from-indigo-500 to-purple-600 text-white py-6 rounded-2xl text-xl font-bold hover:from-indigo-600 hover:to-purple-700 shadow-xl transform hover:-translate-y-1 transition-all">
                🎙️ Generate Audio
            </button>
            <audio id="ttsAudio" controls class="w-full mt-6 rounded-2xl"></audio>
            <div id="ttsResult" class="mt-6"></div>
        </div>

        <!-- OCR Card -->
        <div class="bg-white/80 backdrop-blur-xl rounded-3xl p-8 mb-8 shadow-2xl border border-white/50">
            <h3 class="text-2xl font-bold text-gray-800 mb-6 flex items-center gap-3">
                🖼️ Image to Text (OCR)
            </h3>
            <input type="file" id="ocrFile" accept="image/*" class="w-full p-6 border-2 border-gray-200 rounded-2xl mb-6 file:mr-6 file:py-4 file:px-8 file:rounded-xl file:border-0 file:bg-indigo-500 file:text-white hover:file:bg-indigo-600">
            <button onclick="imageToText()" 
                class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 text-white py-6 rounded-2xl text-xl font-bold hover:from-emerald-600 hover:to-teal-700 shadow-xl transform hover:-translate-y-1 transition-all">
                ✨ Extract Text
            </button>
            <div id="ocrResult" class="mt-6"></div>
        </div>

        <!-- Footer -->
        <div class="text-center text-gray-500 mt-12">
            <p>Powered by Vercel • Open Source • Unlimited</p>
        </div>
    </div>

    <script>
        const API_BASE = '/api/v1';
        
        // Speed control
        document.getElementById('ttsSpeed').addEventListener('input', (e) => {
            document.getElementById('speedValue').textContent = e.target.value + 'x';
        });

        async function showResult(id, html, type = 'success') {
            const div = document.getElementById(id);
            const bg = type === 'success' ? 'bg-emerald-100 border-emerald-400' : 'bg-red-100 border-red-400';
            div.innerHTML = `<div class="mt-6 p-6 rounded-2xl border-4 ${bg} text-lg">${html}</div>`;
        }

        async function textToSpeech() {
            const text = document.getElementById('ttsText').value;
            const lang = document.getElementById('ttsLang').value;
            const speed = document.getElementById('ttsSpeed').value;

            if (!text.trim()) return alert('⛔ Masukkan teks dulu!');

            showResult('ttsResult', '⏳ Generating audio...', 'loading');

            try {
                const response = await fetch(`${API_BASE}/text-to-speech`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, lang, speed })
                });

                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('ttsAudio').src = data.url + '?t=' + Date.now();
                    document.getElementById('ttsAudio').style.display = 'block';
                    showResult('ttsResult', `
                        ✅ <strong>Audio Ready!</strong><br>
                        <a href="${data.url}" class="underline" target="_blank">📥 Download MP3</a>
                    `);
                } else {
                    throw new Error(data.error);
                }
            } catch (error) {
                showResult('ttsResult', `❌ ${error.message}`, 'error');
            }
        }

        async function imageToText() {
            const file = document.getElementById('ocrFile').files[0];
            if (!file) return alert('⛔ Pilih gambar dulu!');

            const reader = new FileReader();
            reader.onload = async function(e) {
                showResult('ocrResult', '⏳ Menganalisa gambar...', 'loading');

                try {
                    const response = await fetch(`${API_BASE}/image-to-text`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image: e.target.result })
                    });

                    const data = await response.json();
                    
                    if (data.success) {
                        showResult('ocrResult', `
                            ✅ <strong>Text berhasil diekstrak!</strong><br>
                            <div class="mt-4 p-4 bg-white rounded-xl font-mono text-sm">${data.text || 'Tidak ada teks'}</div>
                        `);
                    } else {
                        throw new Error(data.error);
                    }
                } catch (error) {
                    showResult('ocrResult', `❌ ${error.message}`, 'error');
                }
            };
            reader.readAsDataURL(file);
        }

        // Enter to generate
        document.getElementById('ttsText').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) textToSpeech();
        });
    </script>
</body>
</html>
